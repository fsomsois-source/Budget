<style>
*{box-sizing:border-box;margin:0;padding:0;}

<body>

<!-- Main app -->
<div id="app">
  <div id="main" style="width:100%;padding:1.4rem .6rem 6rem;box-sizing:border-box;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem;">

        <div id="hdr-sub" style="font-size:.7rem;color:#505070;margin-top:-4px;letter-spacing:.05em;"></div>

<!-- Firebase SDKs -->
<script>
/* ── Default categories ── */
const DEFAULT_CATS = [
  {id:"logement",  label:"Logement",     icon:"🏠", weight:30},
  {id:"alim",      label:"Alimentation", icon:"🛒", weight:20},
  {id:"transport", label:"Transport",    icon:"🚗", weight:12},
  {id:"sante",     label:"Santé",        icon:"💊", weight:8},
  {id:"abos",      label:"Abonnements",  icon:"📱", weight:7},
  {id:"loisirs",   label:"Loisirs",      icon:"🎉", weight:10},
  {id:"vetements", label:"Vêtements",    icon:"👗", weight:6},
  {id:"autre",     label:"Autre",        icon:"📦", weight:7},
];
const DEBT_ICONS   = ["💳","🏦","🚗","🏥","📱","🏠","🎓","💼","⚡","👨‍👩‍👧"];
const DEFAULT_INCOME_TYPES = ["💼 Freelance","🏆 Prime","🎁 Virement","📈 Investissement","🤝 Aide","💰 Autre","↩️ Remboursement"];
const CAT_ICONS    = ["🏠","🛒","🚗","💊","📱","🎉","👗","📦","🍽️","🎓","💡","🏋️","🐶","🌿","🎮","✈️","🏖️","💈","🎨","🧴","🧸","🏥","📚","🎵","🔧","🛍️","💻","📸","💸","↩️","🔄","🏧","💰","🎁","🤝","⚽","🚿","🧹","🪴","🍷","☕","🚌","🚂","🛳️","🎪","🎭","🎬","🏨","🔑","📋","🩺","💉","🧳","🎒","👶","🧒","👴","🌍"];

/* ── State ── */
let state = {incomes:[], expenses:[], debts:[], recurring:[], cats: DEFAULT_CATS.map(c=>({...c})), incomeTypes: [...DEFAULT_INCOME_TYPES], soldeDepart: 0, soldeDateRef: "", limiteCBDiff: 0, jourBascule: 20, enveloppeCB: 0, revolut_virements: [], differeEnAttente: 0, margeCible: 0};
let currentTab = "dashboard";
let simVal     = 80;
let toastTimer = null;
let saveTimer  = null;

/* ── LocalStorage ── */
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try { localStorage.setItem("budget_data", JSON.stringify(state)); } catch(e){}
  }, 400);
}

function loadState(){
  try {
    const raw = localStorage.getItem("budget_data");
    if(raw){ state = Object.assign({incomes:[],expenses:[],debts:[],recurring:[],cats:DEFAULT_CATS.map(c=>({...c})),incomeTypes:[...DEFAULT_INCOME_TYPES],soldeDepart:0,soldeDateRef:"",limiteCBDiff:0,jourBascule:20,enveloppeCB:0,revolut_virements:[],differeEnAttente:0}, JSON.parse(raw)); }
    if(!state.cats||!state.cats.length) state.cats = DEFAULT_CATS.map(c=>({...c}));
    if(!state.incomeTypes||!state.incomeTypes.length) state.incomeTypes = [...DEFAULT_INCOME_TYPES];
    if(!state.revolut_virements) state.revolut_virements = [];
    if(!state.differeEnAttente) state.differeEnAttente = 0;
  } catch(e){}
}

/* ── Helpers ── */
const fmt    = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const fmtD   = iso => { try{ return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}); }catch(e){ return ""; } };
const uid    = () => Math.random().toString(36).slice(2,9);
const today  = () => new Date().toISOString().slice(0,10);
const thisM  = () => new Date().toISOString().slice(0,7);
const monthOf= off => { const d=new Date(); d.setMonth(d.getMonth()+(off||0)); return d.toISOString().slice(0,7); };
const monthLbl=off => { const d=new Date(); d.setMonth(d.getMonth()+(off||0)); return d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}); };
const clamp  = (v,a,b) => Math.max(a,Math.min(b,v));
const barCol = pct => pct>100?"linear-gradient(90deg,#ef4444,#f87171)":pct>85?"linear-gradient(90deg,#d97706,#facc15)":"linear-gradient(90deg,#059669,#10b981)";
const sumOf  = (arr,m) => arr.filter(x=>(x.date||"").startsWith(m||thisM())).reduce((a,x)=>a+(x.amount||0),0);
const getCats= () => state.cats && state.cats.length ? state.cats : DEFAULT_CATS.map(c=>({...c}));

/* ── Recurring injection ── */
function injectRecurring(){
  if(!state.recurring||!state.recurring.length) return;
  const m = thisM();
  let changed = false;
  state.recurring.forEach(r => {
    // Vérifier date de fin
    if(r.dateFin && m > r.dateFin) return;
    const tag = r.id+":"+m;
    const isExpense = r.kind === "expense";
    const alreadyDone = isExpense
      ? state.expenses.some(x=>x.recurringTag===tag)
      : state.incomes.some(x=>x.recurringTag===tag);
    if(alreadyDone) return;
    const count = r.frequency==="weekly"?4:1;
    for(let i=0;i<count;i++){
      const d = new Date();
      if(r.frequency==="weekly") d.setDate(1+(i*7));
      else d.setDate(Math.min(r.dayOfMonth||1,new Date(d.getFullYear(),d.getMonth()+1,0).getDate()));
      if(d > new Date()) continue; // Ne pas générer les dates futures
      if(isExpense){
        state.expenses.push({id:uid(),amount:r.amount,catId:r.catId||"autre",
          label:(r.label)+(count>1?` (sem.${i+1})`:"")+` 🔄`,
          date:d.toISOString().slice(0,10),recurringTag:tag,fromRecurring:r.id,cbDiff:!!r.cbDiff});
      } else {
        state.incomes.push({id:uid(),amount:r.amount,type:r.type||"💰 Autre",
          note:(r.label||r.type)+(count>1?` (sem.${i+1})`:"")+` 🔄`,
          date:d.toISOString().slice(0,10),recurringTag:tag,fromRecurring:r.id});
      }
      changed=true;
    }
  });
  if(changed) saveState();
}

/* ── Plafond engine ── */
function computePlafond(avgIncome){
  if(avgIncome<=0) return null;
  // Récurrents fixes mensuels
  const recurFixe = state.recurring
    .filter(r=>r.kind==="expense"&&r.frequency==="monthly")
    .reduce((a,r)=>a+(r.amount||0),0);
  // Découvert à combler (solde négatif)
  const decouvert = Math.max(0, -(state.soldeDepart||0));
  // Débit différé conseillé = revenus − charges récurrentes fixes − découvert à combler
  const differeConseille = Math.max(0, Math.round(avgIncome - recurFixe - decouvert));
  return {differeConseille, recurFixe, decouvert};
}

/* ── Computed ── */
function computed(){
  const m         = thisM();
  const cats      = getCats();
  const todayStr  = today();
  // Exclure les remboursements du calcul des revenus
  const incomesSansRemb = state.incomes.filter(x=>!x.type?.includes("Remboursement"));
  const monthIncome  = sumOf(incomesSansRemb.filter(x=>x.date<=todayStr),m);
  const monthDebtPay = sumOf(state.expenses.filter(e=>e.catId==="dettes"&&e.date<=todayStr),m);
  const monthExpense = sumOf(state.expenses.filter(e=>e.catId!=="dettes"&&e.date<=todayStr),m);
  // Solde fin de mois = (soldeDepart − différé en attente) + toutes transactions après date de référence
  const dateRef = state.soldeDateRef||todayStr;
  const totalIncApres = state.incomes.filter(x=>x.date>dateRef&&!x.cbRevolut).reduce((a,x)=>a+(x.amount||0),0);
  const totalExpApres = state.expenses.filter(x=>x.date>dateRef&&!x.cbDiff).reduce((a,x)=>a+(x.amount||0),0);
  const balance = (state.soldeDepart||0) - (state.differeEnAttente||0) + totalIncApres - totalExpApres;
  const spentByCat   = {};
  cats.forEach(c=>{ spentByCat[c.id]=state.expenses.filter(e=>e.catId===c.id&&(e.date||"").startsWith(m)&&e.date<=todayStr).reduce((a,x)=>a+x.amount,0); });
  const totalDebt    = state.debts.reduce((a,d)=>a+(d.remaining||0),0);
  const totalOrig    = state.debts.reduce((a,d)=>a+(d.total||0),0);
  const inc3         = [0,1,2].map(i=>sumOf(incomesSansRemb.filter(x=>x.date<=todayStr),monthOf(-i))).filter(v=>v>0);
  const avgIncome    = inc3.length?inc3.reduce((a,v)=>a+v,0)/inc3.length:monthIncome;
  const plafondData  = computePlafond(avgIncome);
  const barData      = Array.from({length:5},(_,i)=>{const bd=new Date();bd.setMonth(bd.getMonth()-4+i);const bmm=bd.toISOString().slice(0,7);return{m:bd.toLocaleDateString("fr-FR",{month:"short"}),revenus:sumOf(state.incomes,bmm),depenses:state.expenses.filter(e=>(e.date||"").startsWith(bmm)).reduce((a,x)=>a+x.amount,0)};});
  const recentTx     = [...state.incomes.map(x=>({...x,_k:"in"})),...state.expenses.map(x=>({...x,_k:"out"}))].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);
  return {monthIncome,monthDebtPay,monthExpense,balance,spentByCat,totalDebt,totalOrig,avgIncome,plafondData,barData,recentTx};
}

/* ── DOM helpers ── */
function notify(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.remove("hidden"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.add("hidden"),2800); }
function confirmAction(msg, fn){ if(confirm(msg)) fn(); }
// Extrait le 1er emoji d'un type (ex: "💰 Vini" -> "💰", "💰Vini" -> "💰")
function typeIcon(t){ if(!t) return "💰"; const arr=Array.from(t.trim()); return arr[0]||"💰"; }
function el(tag,cs,st,ch){ const e=document.createElement(tag); if(cs) e.className=cs; if(st) Object.assign(e.style,st); if(ch){ (Array.isArray(ch)?ch:[ch]).forEach(c=>{ if(c==null) return; if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(c)); else e.appendChild(c); }); } return e; }
function div(cs,st,ch){ return el("div",cs,st,ch); }
function span(txt,st){ const s=el("span"); s.textContent=txt; if(st) Object.assign(s.style,st); return s; }
function btn(label,cls,onClick){ const b=el("button","btn "+(cls||"btn-ghost")); b.innerHTML=label; if(onClick) b.addEventListener("click",onClick); return b; }
function makeProgress(pct,color,h){ h=h||8; const tr=div("ptrack",{height:h+"px"}); const fi=div("pfill",{width:clamp(pct,0,100)+"%",background:color||"linear-gradient(90deg,#e85d04,#f48c06)"}); tr.appendChild(fi); return tr; }
function mkInp(t,ph,val){ const i=el("input"); i.type=t||"text"; if(ph) i.placeholder=ph; if(val!==undefined&&val!=="") i.value=val; return i; }

/* ── SVG Charts ── */
function makeAreaChart(data,keyA,keyB,cA,cB,h){
  cA=cA||"#e85d04"; cB=cB||"#10b981"; h=h||160;
  if(!data||data.length<2) return document.createTextNode("");
  const ns="http://www.w3.org/2000/svg",W=340,H=h,pl=44,pr=10,pt=10,pb=28,iW=W-pl-pr,iH=H-pt-pb;
  const allV=[...data.map(d=>d[keyA]||0),...(keyB?data.map(d=>d[keyB]||0):[])];
  const maxV=Math.max(...allV,1);
  const xP=i=>pl+(i/(data.length-1))*iW;
  const yP=v=>pt+iH-(v/maxV)*iH;
  const pathD=key=>data.map((d,i)=>`${i===0?"M":"L"}${xP(i).toFixed(1)},${yP(d[key]||0).toFixed(1)}`).join(" ");
  const areaD=key=>`${pathD(key)} L${xP(data.length-1).toFixed(1)},${(pt+iH).toFixed(1)} L${pl},${(pt+iH).toFixed(1)} Z`;
  const svg=document.createElementNS(ns,"svg"); svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.style.cssText=`width:100%;height:${H}px;`;
  const defs=document.createElementNS(ns,"defs");
  const mkG=(id,c,o)=>{ const g=document.createElementNS(ns,"linearGradient"); g.setAttribute("id",id); ["x1","y1","x2","y2"].forEach((k,i)=>g.setAttribute(k,["0","0","0","1"][i])); [{o:"0%",op:o},{o:"100%",op:"0"}].forEach(({o:off,op})=>{ const s=document.createElementNS(ns,"stop"); s.setAttribute("offset",off); s.setAttribute("stop-color",c); s.setAttribute("stop-opacity",op); g.appendChild(s); }); return g; };
  const idA="lgA"+Math.random().toString(36).slice(2,6),idB="lgB"+Math.random().toString(36).slice(2,6);
  defs.appendChild(mkG(idA,cA,"0.28")); if(keyB) defs.appendChild(mkG(idB,cB,"0.2")); svg.appendChild(defs);
  [0,.5,1].forEach(r=>{ const v=Math.round(maxV*r),y=yP(maxV*r); const ln=document.createElementNS(ns,"line"); ["x1","y1","x2","y2","stroke","stroke-width"].forEach((k,i)=>[pl,y,W-pr,y,"rgba(255,255,255,.05)","1"].forEach((v2,j)=>i===j&&ln.setAttribute(k,v2))); svg.appendChild(ln); const t=document.createElementNS(ns,"text"); t.setAttribute("x",pl-4); t.setAttribute("y",y+4); t.setAttribute("text-anchor","end"); t.setAttribute("fill","#505070"); t.setAttribute("font-size","9"); t.textContent=v>=1000?Math.round(v/1000)+"k":v; svg.appendChild(t); });
  const addA=(key,gid,col,dash)=>{ const a=document.createElementNS(ns,"path"); a.setAttribute("d",areaD(key)); a.setAttribute("fill",`url(#${gid})`); svg.appendChild(a); const p=document.createElementNS(ns,"path"); p.setAttribute("d",pathD(key)); p.setAttribute("fill","none"); p.setAttribute("stroke",col); p.setAttribute("stroke-width","2"); p.setAttribute("stroke-linejoin","round"); if(dash) p.setAttribute("stroke-dasharray","5,3"); svg.appendChild(p); };
  addA(keyA,idA,cA,false); if(keyB) addA(keyB,idB,cB,true);
  [0,Math.floor((data.length-1)/2),data.length-1].forEach(i=>{ const t=document.createElementNS(ns,"text"); t.setAttribute("x",xP(i)); t.setAttribute("y",H-6); t.setAttribute("text-anchor","middle"); t.setAttribute("fill","#505070"); t.setAttribute("font-size","9"); t.textContent=(data[i]&&data[i].m)||""; svg.appendChild(t); });
  return svg;
}
function makeBarChart(data,h){
  h=h||130; if(!data||!data.length) return document.createTextNode("");
  const ns="http://www.w3.org/2000/svg",W=340,H=h,pl=10,pr=8,pt=8,pb=24,iW=W-pl-pr,iH=H-pt-pb;
  const maxV=Math.max(...data.map(d=>Math.max(d.revenus||0,d.depenses||0)),1);
  const bw=Math.floor(iW/data.length*0.32),gap=iW/data.length;
  const svg=document.createElementNS(ns,"svg"); svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.style.cssText=`width:100%;height:${H}px;`;
  data.forEach((d,i)=>{ const cx=pl+gap*i+gap/2,hR=((d.revenus||0)/maxV)*iH,hD=((d.depenses||0)/maxV)*iH; const mk=(x,y,w,h2,fill)=>{ const r=document.createElementNS(ns,"rect"); [["x",x],["y",y],["width",w],["height",Math.max(h2,1)],["fill",fill],["rx","3"]].forEach(([k,v])=>r.setAttribute(k,v)); svg.appendChild(r); }; mk(cx-bw-1,pt+iH-hR,bw,hR,"#10b981"); mk(cx+1,pt+iH-hD,bw,hD,"#f87171"); const t=document.createElementNS(ns,"text"); t.setAttribute("x",cx); t.setAttribute("y",H-6); t.setAttribute("text-anchor","middle"); t.setAttribute("fill","#505070"); t.setAttribute("font-size","9"); t.textContent=d.m; svg.appendChild(t); });
  return svg;
}

/* ════════════════════════════════════
   PAGE : DASHBOARD
════════════════════════════════════ */
function renderDashboard(c){
  c.innerHTML="";
  const cv=computed();
  const ml=div("",{textAlign:"center"}); const ms=div("sec"); ms.style.marginBottom="0";
  const now2=new Date(); ms.textContent=now2.toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
  ml.appendChild(ms); c.appendChild(ml);

  // ── Marge = solde fin de mois − virements Revolut du cycle en cours (cycle 20→20) ──
  { const today2m=new Date(); today2m.setHours(0,0,0,0);
    const todayDayM=today2m.getDate();
    const startCycleM=new Date(today2m);
    if(todayDayM>=20){ startCycleM.setDate(20); startCycleM.setHours(0,0,0,0); }
    else { startCycleM.setMonth(today2m.getMonth()-1); startCycleM.setDate(20); startCycleM.setHours(0,0,0,0); }
    const startCycleStrM=startCycleM.toISOString().slice(0,10);
    const virCycle=(state.revolut_virements||[])
      .filter(v=>v.date>=startCycleStrM)
      .reduce((s,v)=>s+(v.amount||0),0);
    const ep=cv.balance-virCycle;
    const cible=state.margeCible||0;
    const hdrRight=document.querySelector("#main > div:first-child > div:last-child");
    if(hdrRight&&!hdrRight.querySelector(".ep-tag")&&(state.incomes.length||state.soldeDepart)){
      const tag=el("div"); tag.className="ep-tag";
      tag.style.cssText=`font-size:.68rem;font-weight:600;color:${ep>=0?"#10b981":"#f87171"};opacity:.7;text-align:right;line-height:1.3;`;
      const cibleStr=cible>0?`<span style="color:#404060;font-weight:400;font-size:.62rem;"> / ${cible>=0?"+":""}${fmt(cible)}</span>`:"";
      tag.innerHTML=`<span style="color:#404060;font-weight:400;">marge</span><br>${ep>=0?"+":""}${fmt(ep)}${cibleStr}`;
      hdrRight.insertBefore(tag,hdrRight.firstChild);
    }
  }

  // Même calcul que page CB : virements du mois − achats CB
  const nowM=new Date().toISOString().slice(0,7);
  const totalVirementsBoard=(state.revolut_virements||[]).filter(v=>v.date.startsWith(nowM)).reduce((s,v)=>s+(v.amount||0),0);
  const totalCreditsBoard=state.incomes.filter(x=>x.cbRevolut).reduce((a,x)=>a+(x.amount||0),0);
  const totalAchatsBoard=state.expenses.filter(x=>x.cbDiff).reduce((a,x)=>a+(x.amount||0),0)-totalCreditsBoard;
  const resteDebit2=Math.max(0,totalVirementsBoard-totalAchatsBoard);

  // Solde aujourd'hui = solde réel + transactions depuis date de référence jusqu'à aujourd'hui
  const todayStr2=today();
  const dateRef3=state.soldeDateRef||todayStr2;
  const incAujourd=state.incomes.filter(x=>x.date>dateRef3&&x.date<=todayStr2&&!x.cbRevolut).reduce((a,x)=>a+(x.amount||0),0);
  const expAujourd=state.expenses.filter(x=>x.date>dateRef3&&x.date<=todayStr2&&!x.cbDiff).reduce((a,x)=>a+(x.amount||0),0);
  const soldeAujourd=(state.soldeDepart||0)+incAujourd-expAujourd;

  // Deux grandes cartes solde
  const soldeRow=div("",{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".7rem",marginBottom:".7rem"});
  const cardAujourd=div("card",{padding:"1rem 1.1rem",background:soldeAujourd>=0?"rgba(16,185,129,.06)":"rgba(239,68,68,.06)",border:soldeAujourd>=0?"1px solid rgba(16,185,129,.2)":"1px solid rgba(239,68,68,.2)"});
  cardAujourd.innerHTML=`<div class="sec" style="margin-bottom:.2rem;">Aujourd'hui</div><div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:900;color:${soldeAujourd>=0?"#10b981":"#f87171"};">${fmt(soldeAujourd)}</div>`;
  const cardFinMois=div("card",{padding:"1rem 1.1rem",background:cv.balance>=0?"rgba(16,185,129,.06)":"rgba(239,68,68,.06)",border:cv.balance>=0?"1px solid rgba(16,185,129,.2)":"1px solid rgba(239,68,68,.2)"});
  cardFinMois.innerHTML=`<div class="sec" style="margin-bottom:.2rem;">Fin de mois</div><div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:900;color:${cv.balance>=0?"#10b981":"#f87171"};">${fmt(cv.balance)}</div>`;
  soldeRow.appendChild(cardAujourd); soldeRow.appendChild(cardFinMois);
  c.appendChild(soldeRow);

  const g4=div("",{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".7rem"});
  g4.appendChild(makeStatBox("💳 Reste CB Revolut",fmt(resteDebit2),resteDebit2>0?"#f48c06":"#f87171",true));
  g4.appendChild(makeStatBox("💚 Vini",fmt(cv.totalDebt),"#f48c06",true));
  c.appendChild(g4);

  // Dû par Vini — affiché uniquement en haut à droite, pas ici

  // Transactions à venir uniquement
  // Récurrents futurs pas encore générés
  const todayD=new Date(); todayD.setHours(0,0,0,0);
  const curM=new Date().toISOString().slice(0,7);
  const futureRec=[];
  const todayDay=new Date().getDate();
  state.recurring.filter(r=>r.kind==="expense"&&r.frequency==="monthly").forEach(r=>{
    const dom=r.dayOfMonth||1;
    if(dom<=todayDay) return;
    const rTag=r.id+":"+curM;
    if(state.expenses.some(x=>x.recurringTag===rTag)) return;
    if(r.dateFin&&curM>r.dateFin) return;
    const yr=new Date().getFullYear(), mo=new Date().getMonth()+1;
    const dStr=`${yr}-${String(mo).padStart(2,'0')}-${String(dom).padStart(2,'0')}`;
    futureRec.push({id:"rec-"+r.id,amount:r.amount,label:r.label,date:dStr,catId:r.catId,_k:"out"});
  });
  const txAVenir = [...state.incomes.filter(x=>x.date>today()&&!x.cbRevolut).map(x=>({...x,_k:"in"})),...state.expenses.filter(x=>x.date>today()).map(x=>({...x,_k:"out"})),...futureRec].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,15);
  const rtl=div("sec"); rtl.textContent="Transactions à venir"; c.appendChild(rtl);
  if(!txAVenir.length){ const e=div("card",{padding:"1.5rem",textAlign:"center",color:"#505070",fontSize:".85rem"}); e.textContent="Aucune transaction à venir — saisis tes récurrents dans Flux !"; c.appendChild(e); }
  else { const rtc=div("card",{padding:"0 1.1rem"}); txAVenir.forEach(tx=>rtc.appendChild(makeTxRow(tx))); c.appendChild(rtc); }
}

function makeTxRow(tx){
  const cats=getCats(); const cat=cats.find(c=>c.id===tx.catId);
  const row=div("tx");
  const ico=span(tx._k==="in"?typeIcon(tx.type):(cat&&cat.icon)||"💸"); ico.style.fontSize="1.2rem";
  const info=el("div"); info.style.cssText="flex:1;min-width:0;";
  const nm=el("div"); nm.style.cssText="font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"; nm.textContent=tx._k==="in"?(tx.note||tx.type):(tx.label||(cat&&cat.label)||"Dépense");
  const dt=el("div"); dt.style.cssText="font-size:.71rem;color:#505070;"; dt.textContent=fmtD(tx.date);
  info.appendChild(nm); info.appendChild(dt);
  const amt=span(`${tx._k==="in"?"+":"-"}${fmt(tx.amount)}`); amt.style.cssText=`font-weight:700;color:${tx._k==="in"?"#10b981":"#f87171"};font-size:.92rem;flex-shrink:0;`;
  row.appendChild(ico); row.appendChild(info); row.appendChild(amt);
  return row;
}

/* ════════════════════════════════════
   PAGE : CASHFLOW
════════════════════════════════════ */
function renderCashflow(c){
  c.innerHTML="";
  const now=new Date(); now.setHours(0,0,0,0);
  const {year,month}=getFluxMonth();
  const monthStr=`${year}-${String(month+1).padStart(2,"0")}`;
  const cats2=getCats();
  const isPast=dateStr=>new Date(dateStr+"T00:00:00")<=now;

  // Navigation mois
  const navRow=div("",{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem"});
  const prevBtn=btn("‹","btn btn-ghost",()=>{ fluxMonthOffset--; renderCashflow(c); }); prevBtn.style.cssText="padding:.5rem .9rem;font-size:1.2rem;";
  const monthLblEl=el("div"); monthLblEl.style.cssText="font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;text-transform:capitalize;";
  monthLblEl.textContent=fluxMonthLabel();
  const nextBtn=btn("›","btn btn-ghost",()=>{ fluxMonthOffset++; renderCashflow(c); }); nextBtn.style.cssText="padding:.5rem .9rem;font-size:1.2rem;";
  if(fluxMonthOffset===0) nextBtn.disabled=true;
  navRow.appendChild(prevBtn); navRow.appendChild(monthLblEl); navRow.appendChild(nextBtn);
  c.appendChild(navRow);

  // Boutons ajout (mois actuel seulement)
  if(fluxMonthOffset===0){
    const g3=el("div"); g3.style.cssText="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin-bottom:1rem;";
    const ba=btn('<span style="font-size:1.2rem">＋</span><span>Revenu</span>',"btn btn-green",()=>openDrawer("income"));
    const bb=btn('<span style="font-size:1.2rem">－</span><span>Dépense</span>',"btn btn-orange",()=>openDrawer("expense"));
    const bc=btn('<span style="font-size:1.2rem">🔄</span><span>Récurrent</span>',"btn btn-ghost",()=>openDrawer("recurring"));
    [ba,bb,bc].forEach(b=>{ b.style.cssText="padding:.85rem .3rem;flex-direction:column;gap:.22rem;border-radius:14px;width:100%;font-size:.78rem;"; });
    g3.appendChild(ba); g3.appendChild(bb); g3.appendChild(bc); c.appendChild(g3);

    // Récurrents configurés (avec ✏️ et ✕)
    const makeRecRow=(r,isInc)=>{
      const cat=cats2.find(ct=>ct.id===r.catId);
      const row=div("tx");
      const ico=span(isInc?typeIcon(r.type):(cat&&cat.icon)||"💸"); ico.style.fontSize="1.2rem";
      const info=el("div"); info.style.cssText="flex:1;min-width:0;";
      const nm=el("div"); nm.style.cssText="font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"; nm.textContent=r.label||r.type;
      const freqTxt=`🔄 Mensuel · le ${r.dayOfMonth}`;
      const finTxt=r.dateFin?` · fin ${r.dateFin}`:"";
      const dt=el("div"); dt.style.cssText="font-size:.71rem;color:#f48c06;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"; dt.textContent=freqTxt+finTxt+(cat&&!isInc?" · "+cat.label:"");
      info.appendChild(nm); info.appendChild(dt);
      const right=el("div"); right.style.cssText="display:flex;align-items:center;gap:.5rem;flex-shrink:0;";
      const amt=span((isInc?"+":"-")+fmt(r.amount)); amt.style.cssText=`color:${isInc?"#10b981":"#f87171"};font-weight:700;`;
      const editBtn=el("button","btn-danger"); editBtn.textContent="✏️"; editBtn.style.cssText="background:rgba(59,130,246,.12);color:#60a5fa;border-color:rgba(59,130,246,.2);";
      const rid=r.id; editBtn.addEventListener("click",()=>openDrawer("editrecurring:"+rid));
      const del=el("button","btn-danger"); del.textContent="✕";
      del.addEventListener("click",()=>{ confirmAction("Supprimer ce récurrent ?\n(Les transactions déjà générées de ce récurrent seront aussi supprimées)",()=>{ state.recurring=state.recurring.filter(x=>x.id!==rid); if(isInc) state.incomes=state.incomes.filter(x=>x.fromRecurring!==rid); else state.expenses=state.expenses.filter(x=>x.fromRecurring!==rid); saveState(); render(); notify("Récurrent supprimé"); }); });
      right.appendChild(amt); right.appendChild(editBtn); right.appendChild(del);
      row.appendChild(ico); row.appendChild(info); row.appendChild(right);
      return row;
    };
    const recInc=state.recurring.filter(r=>r.kind!=="expense");
    const recExp=state.recurring.filter(r=>r.kind==="expense");
    if(recInc.length){ const rl=div("sec"); rl.textContent=`Revenus récurrents (${recInc.length})`; c.appendChild(rl); const rc=div("card",{padding:"0 1.1rem"}); recInc.forEach(r=>rc.appendChild(makeRecRow(r,true))); c.appendChild(rc); }
    if(recExp.length){ const rl=div("sec"); rl.textContent=`Dépenses récurrentes (${recExp.length})`; c.appendChild(rl); const rc=div("card",{padding:"0 1.1rem"}); recExp.forEach(r=>rc.appendChild(makeRecRow(r,false))); c.appendChild(rc); }
  } else {
    // Mois précédent : afficher les récurrents en lecture seule
    const recDisp=state.recurring.filter(r=>{
      if(r.dateFin&&monthStr>r.dateFin) return false;
      return true;
    });
    const recIncD=recDisp.filter(r=>r.kind!=="expense");
    const recExpD=recDisp.filter(r=>r.kind==="expense");
    const makeRecRowRO=(r,isInc)=>{
      const cat=cats2.find(ct=>ct.id===r.catId);
      const day=Math.min(r.dayOfMonth||1,new Date(year,month+1,0).getDate());
      const row=div("tx"); row.style.opacity=".6";
      const ico=span(isInc?typeIcon(r.type):(cat&&cat.icon)||"💸"); ico.style.fontSize="1.2rem";
      const info=el("div"); info.style.cssText="flex:1;min-width:0;";
      const nm=el("div"); nm.style.cssText="font-size:.86rem;font-weight:600;"; nm.textContent=(r.label||r.type)+" 🔄";
      const dt=el("div"); dt.style.cssText="font-size:.71rem;color:#505070;"; dt.textContent=`le ${day}`+(cat&&!isInc?" · "+cat.label:"");
      info.appendChild(nm); info.appendChild(dt);
      const amt=span((isInc?"+":"-")+fmt(r.amount)); amt.style.cssText=`color:${isInc?"#10b981":"#f87171"};font-weight:700;flex-shrink:0;`;
      row.appendChild(ico); row.appendChild(info); row.appendChild(amt);
      return row;
    };
    if(recIncD.length){ const rl=div("sec"); rl.textContent=`Revenus récurrents (${recIncD.length})`; c.appendChild(rl); const rc=div("card",{padding:"0 1.1rem"}); recIncD.forEach(r=>rc.appendChild(makeRecRowRO(r,true))); c.appendChild(rc); }
    if(recExpD.length){ const rl=div("sec"); rl.textContent=`Dépenses récurrentes (${recExpD.length})`; c.appendChild(rl); const rc=div("card",{padding:"0 1.1rem"}); recExpD.forEach(r=>rc.appendChild(makeRecRowRO(r,false))); c.appendChild(rc); }
  }

  // Helper ligne transaction
  const makeRow=(x,isInc)=>{
    const past=isPast(x.date);
    const cat=cats2.find(ct=>ct.id===x.catId);
    const row=div("tx"); if(!past) row.style.opacity=".5";
    const ico=span(isInc?typeIcon(x.type):(cat&&cat.icon)||"💸"); ico.style.fontSize="1.2rem";
    const info=el("div"); info.style.cssText="flex:1;min-width:0;";
    const nm=el("div"); nm.style.cssText="font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"; nm.textContent=isInc?x.note||x.type:x.label||(cat&&cat.label)||"Dépense";
    const dt=el("div"); dt.style.cssText="font-size:.71rem;color:#505070;"; dt.textContent=(past?"":"🕐 ")+fmtD(x.date)+(cat&&!isInc?" · "+cat.label:"");
    info.appendChild(nm); info.appendChild(dt);
    const right=el("div"); right.style.cssText="display:flex;align-items:center;gap:.5rem;flex-shrink:0;";
    const amt=span((isInc?"+":"-")+fmt(x.amount)); amt.style.cssText=`color:${isInc?"#10b981":"#f87171"};font-weight:700;`;
    const xid=x.id;
    const editBtn=el("button","btn-danger"); editBtn.textContent="✏️"; editBtn.style.cssText="background:rgba(59,130,246,.12);color:#60a5fa;border-color:rgba(59,130,246,.2);";
    editBtn.addEventListener("click",()=>openDrawer((isInc?"editincome:":"editexpense:")+xid));
    const del=el("button","btn-danger"); del.textContent="✕";
    del.addEventListener("click",()=>{ confirmAction("Supprimer cette transaction ?",()=>{ if(isInc) state.incomes=state.incomes.filter(i=>i.id!==xid); else state.expenses=state.expenses.filter(e=>e.id!==xid); saveState(); render(); notify("Supprimé"); }); });
    right.appendChild(amt); right.appendChild(editBtn); right.appendChild(del);
    row.appendChild(ico); row.appendChild(info); row.appendChild(right);
    return row;
  };

  // Revenus du mois

let tresoHorizon = 30;
let tresoAvecVini = false;
let fluxMonthOffset = 0; // 0 = mois actuel, -1 = mois précédent, etc.

function getFluxMonth(){
  const d=new Date(); d.setMonth(d.getMonth()+fluxMonthOffset);
  return {year:d.getFullYear(), month:d.getMonth()}; // month 0-11
}
function fluxMonthLabel(){
  const {year,month}=getFluxMonth();
  return new Date(year,month,1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
}


function buildTresoEvents(days, avecVini=false){
  const events = [];
  const today2 = new Date(); today2.setHours(0,0,0,0);

  state.incomes.forEach(x=>{
    if(x.fromRecurring||x.cbRevolut) return; // géré par récurrents, et cbRevolut hors compte principal
    const d=new Date(x.date+"T00:00:00"); 
    if(d>today2) events.push({date:x.date,label:x.note||x.type,amount:x.amount,kind:"in",auto:false});
  });
  state.expenses.forEach(x=>{
    if(x.cbDiff||x.fromRecurring) return; // cbDiff hors calcul, récurrents gérés séparément
    const d=new Date(x.date+"T00:00:00");
    if(d>today2) events.push({date:x.date,label:x.label||"Dépense",amount:-x.amount,kind:"out",auto:false});
  });

  // Bascules CB futures basées sur les virements Revolut du cycle en cours
  // Hypothèse : prélèvement le dernier jour du mois suivant chaque cycle "20→20"
  // Le cycle en cours = depuis le 20 du mois en cours (ou le 20 du mois précédent si on est avant le 20)
  {
    const todayDay=today2.getDate();
    const startCycle=new Date(today2);
    if(todayDay>=20){ startCycle.setDate(20); startCycle.setHours(0,0,0,0); }
    else { startCycle.setMonth(today2.getMonth()-1); startCycle.setDate(20); startCycle.setHours(0,0,0,0); }
    const startCycleStr=startCycle.toISOString().slice(0,10);
    const baseVirements=(state.revolut_virements||[])
      .filter(v=>v.date>=startCycleStr)
      .reduce((s,v)=>s+(v.amount||0),0);
    if(baseVirements>0){
      // On projette ce montant comme prélèvement le dernier jour de chaque mois suivant
      // pour les cycles à venir dans la fenêtre `days`
      // Le 1er prélèvement futur = dernier jour du mois courant si on est avant la fin du cycle (avant le 20 prochain)
      // Logique simplifiée : on injecte au dernier jour du mois suivant le 20 de fin de cycle
      const dayMs=86400000;
      for(let i=1;i<=days;i++){
        const d=new Date(today2.getTime()+i*dayMs);
        // Dernier jour du mois ?
        const tomorrow=new Date(d.getTime()+dayMs);
        if(tomorrow.getMonth()!==d.getMonth()){
          // d est le dernier jour de son mois
          // On y injecte la bascule, mais seulement si elle correspond à un cycle après le cycle en cours
          // Cycle en cours se termine le 20 du mois courant ou prochain
          const endCycle=new Date(startCycle); endCycle.setMonth(endCycle.getMonth()+1);
          if(d>=endCycle){
            events.push({date:d.toISOString().slice(0,10),label:"Bascule CB (estim.)",amount:-baseVirements,kind:"out",auto:true,bascule:true});
          }
        }
      }
    }
  }

  if(avecVini){
    const vini=state.debts.find(d=>d.name==="Vini");
    if(vini&&vini.remaining>0){
      let rem=vini.remaining;
      for(let i=1;i<=days&&rem>0;i++){
        const d=new Date(today2); d.setDate(today2.getDate()+i);
        if(d.getDate()===15){
          const v=Math.min(1000,rem);
          events.push({date:d.toISOString().slice(0,10),label:"Vini (estimé)",amount:v,kind:"in",auto:true,vini:true});
          rem-=v;
        }
      }
    }
  }

  state.recurring.forEach(r=>{
    for(let i=1;i<=days;i++){
      const d=new Date(today2); d.setDate(today2.getDate()+i);
      const mm=d.toISOString().slice(0,7);
      if(r.dateFin && mm > r.dateFin) continue;
      let shouldFire=false;
      if(r.frequency==="monthly"&&d.getDate()===(r.dayOfMonth||1)) shouldFire=true;
      if(r.frequency==="weekly"&&d.getDay()===1) shouldFire=true;
      if(shouldFire) events.push({date:d.toISOString().slice(0,10),label:r.label+(r.dateFin&&mm===r.dateFin?" (dernier)":""),amount:r.kind==="expense"?-r.amount:r.amount,kind:r.kind==="expense"?"out":"in",auto:true});
    }
  });

  events.sort((a,b)=>new Date(a.date)-new Date(b.date));
  return events;
}

function renderProjection(c){
  c.innerHTML="";

  const tabRow=div("",{display:"flex",gap:".5rem",marginBottom:".8rem"});
  [30,60,90].forEach(h=>{
    const tb=btn(h+" j","btn "+(tresoHorizon===h?"btn-orange":"btn-ghost"),()=>{ tresoHorizon=h; renderProjection(c); });
    tb.style.cssText="flex:1;padding:.55rem;font-size:.82rem;"; tabRow.appendChild(tb);
  });
  c.appendChild(tabRow);

  const viniRow=div("",{display:"flex",alignItems:"center",gap:".7rem",marginBottom:"1rem",padding:".7rem 1rem",background:"rgba(255,255,255,.03)",borderRadius:"12px",border:"1px solid rgba(255,255,255,.06)"});
  const viniToggle=el("input"); viniToggle.type="checkbox"; viniToggle.checked=tresoAvecVini;
  viniToggle.style.cssText="width:18px;height:18px;accent-color:#10b981;cursor:pointer;flex-shrink:0;";
  viniToggle.addEventListener("change",()=>{ tresoAvecVini=viniToggle.checked; renderProjection(c); });
  const viniLbl=el("div"); viniLbl.innerHTML='<div style="font-size:.86rem;font-weight:600;">Inclure remboursements Vini</div><div style="font-size:.72rem;color:#505070;">Scénario optimiste — 1 000 € estimés le 15 de chaque mois</div>';
  viniRow.appendChild(viniToggle); viniRow.appendChild(viniLbl); c.appendChild(viniRow);

  const dateRef2=state.soldeDateRef||today();
  const todayStr=today();
  const totalIncApres2=state.incomes.filter(x=>x.date>dateRef2&&x.date<=todayStr&&!x.cbRevolut).reduce((a,x)=>a+(x.amount||0),0);
  const totalExpApres2=state.expenses.filter(x=>x.date>dateRef2&&x.date<=todayStr&&!x.cbDiff).reduce((a,x)=>a+(x.amount||0),0);
  const soldeAujourdhui=(state.soldeDepart||0)-(state.differeEnAttente||0)+totalIncApres2-totalExpApres2;
  const today2=new Date(); today2.setHours(0,0,0,0);
  const events=buildTresoEvents(tresoHorizon,tresoAvecVini);
  const futureEvents=events.filter(ev=>new Date(ev.date)>today2);

  let runBalPreview=soldeAujourdhui;
  futureEvents.forEach(ev=>{runBalPreview+=ev.amount;});
  const finalDate=new Date(today2); finalDate.setDate(today2.getDate()+tresoHorizon);
  const finalCard=div("card",{padding:"1rem 1.2rem",marginBottom:".8rem",background:runBalPreview>=0?"rgba(16,185,129,.06)":"rgba(239,68,68,.06)",border:runBalPreview>=0?"1px solid rgba(16,185,129,.2)":"1px solid rgba(239,68,68,.2)"});
  finalCard.innerHTML=`<div class="sec" style="margin-bottom:.2rem;">Solde dans ${tresoHorizon} jours · ${finalDate.toLocaleDateString("fr-FR",{day:"2-digit",month:"long"})}</div><div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:900;color:${runBalPreview>=0?"#10b981":"#f87171"};">${fmt(runBalPreview)}</div><div style="font-size:.72rem;color:#505070;margin-top:.3rem;">${tresoAvecVini?"Vini inclus (estimatif)":"Sans remboursements Vini"}</div>`;
  c.appendChild(finalCard);

  if(!futureEvents.length){const empty=div("card",{padding:"1.2rem",textAlign:"center",color:"#505070",fontSize:".85rem"});empty.textContent="Aucun événement prévu.";c.appendChild(empty);return;}

  const tableWrap=div("card",{padding:"0",overflowX:"hidden"});
  const table=el("table"); table.style.cssText="width:100%;border-collapse:collapse;font-size:.82rem;";
  const thead=el("thead"); const trh=el("tr"); trh.style.cssText="background:#1a1a2e;";
  ["Date","Événement","Montant","Solde"].forEach((h,i)=>{const th=el("th");th.textContent=h;th.style.cssText=`padding:.6rem .8rem;color:#8080a0;font-weight:600;text-transform:uppercase;font-size:.65rem;letter-spacing:.06em;text-align:${i>=2?"right":"left"};border-bottom:1px solid rgba(255,255,255,.08);`;trh.appendChild(th);});
  thead.appendChild(trh); table.appendChild(thead);
  const tbody=el("tbody"); let runBal=soldeAujourdhui;
  futureEvents.forEach((ev,idx)=>{
    runBal+=ev.amount;

  else if(type==="addcat"||type.startsWith("editcat:")){
    const isEdit=type.startsWith("editcat:");
    const editCat=isEdit?cats.find(c=>c.id===type.slice(8)):null;
    const t=div("drawer-title"); t.textContent=isEdit?"Modifier la catégorie":"Nouvelle catégorie"; dc.appendChild(t);
    const f=div("form-col");
    const ni=mkInp("text","Ex : Épargne, Animaux, Cadeaux…",isEdit?editCat.label:"");
    const wi=mkInp("number","10",isEdit?String(editCat.weight):"10"); wi.min="1"; wi.max="100";
    let selIco=isEdit?editCat.icon:"📦";
    const icoRow=el("div"); icoRow.style.cssText="display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem;max-height:140px;overflow-y:auto;";
    CAT_ICONS.forEach(em=>{ const b=el("button","emo-btn"+(em===selIco?" sel":"")); b.textContent=em; b.addEventListener("click",()=>{ selIco=em; icoRow.querySelectorAll(".emo-btn").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }); icoRow.appendChild(b); });
    const iw=el("div"); const il=el("label"); il.textContent="Icône"; iw.appendChild(il); iw.appendChild(icoRow);
    f.appendChild(mkField("Nom de la catégorie",ni));
    f.appendChild(mkField("Poids (part du budget, ex: 20 = 20%)",wi));
    f.appendChild(iw);
    f.appendChild(mkFooter(isEdit?"Enregistrer":"Ajouter","btn-orange",()=>{
      if(!ni.value.trim()) return;
      const wt=Math.max(1,parseInt(wi.value)||10);
      if(isEdit){
        state.cats=state.cats.map(c=>c.id===editCat.id?{...c,label:ni.value.trim(),icon:selIco,weight:wt}:c);
        notify("Catégorie modifiée ✅");
      } else {
        if(!state.cats) state.cats=DEFAULT_CATS.map(c=>({...c}));
        state.cats.push({id:uid(),label:ni.value.trim(),icon:selIco,weight:wt});
        notify("Catégorie ajoutée ✅");
      }
      saveState(); render(); closeDrawer();
    }));
    ni.focus(); dc.appendChild(f);
  }
  else if(type.startsWith("editrecurring:")){
    const rid=type.slice(14); const r=state.recurring.find(x=>x.id===rid); if(!r){closeDrawer();return;}
    const t=div("drawer-title"); t.textContent="Modifier — "+r.label; dc.appendChild(t);
    const f=div("form-col");
    const kindSel=mkSel([{value:"income",label:"💰 Revenu"},{value:"expense",label:"💸 Dépense"}],r.kind||"expense");
    const li=mkInp("text","Label",r.label);
    const ai=mkInp("number","0",String(r.amount));
    const di=mkInp("number","1",String(r.dayOfMonth||1)); di.min="1"; di.max="31";
    const dfi=mkInp("month","",r.dateFin||"");
    const tsr=mkSel(state.incomeTypes,r.type||state.incomeTypes[0]);
    const catSel=mkSel(cats.map(c=>({value:c.id,label:c.icon+" "+c.label})),r.catId||cats[0]?.id);
    const typeWrap=mkField("Type de revenu",tsr);
    const catWrap=mkField("Catégorie",catSel);
    const isExp0 = (r.kind === "expense");
    typeWrap.style.display = isExp0 ? "none" : "";
    catWrap.style.display  = isExp0 ? "" : "none";
    const cbCheck=el("div"); cbCheck.style.cssText="display:flex;align-items:center;gap:.6rem;";
    const cbInp=el("input"); cbInp.type="checkbox"; cbInp.checked=!!r.cbDiff; cbInp.style.cssText="width:18px;height:18px;accent-color:#f48c06;cursor:pointer;";
    const cbLbl=el("label"); cbLbl.style.cssText="font-size:.85rem;color:#e8e0f8;text-transform:none;letter-spacing:0;"; cbLbl.textContent="💳 Débit différé (Revolut)";
    cbCheck.appendChild(cbInp); cbCheck.appendChild(cbLbl);
    cbCheck.style.display = isExp0 ? "" : "none";
    kindSel.addEventListener("change", function(){
      const isExp2 = this.value === "expense";
      typeWrap.style.display = isExp2 ? "none" : "";
      catWrap.style.display  = isExp2 ? "" : "none";
      cbCheck.style.display  = isExp2 ? "" : "none";
    });
    f.appendChild(mkField("Type",kindSel));
    f.appendChild(mkField("Label",li));
    f.appendChild(mkField("Montant (€)",ai));
    f.appendChild(typeWrap);
    f.appendChild(catWrap);
    f.appendChild(mkField("Jour du mois",di));
    f.appendChild(mkField("Fin (optionnel, YYYY-MM)",dfi));
    f.appendChild(cbCheck);
    f.appendChild(mkFooter("Enregistrer","btn-orange",()=>{
      const a=parseFloat(ai.value); if(!li.value||isNaN(a)) return;
      const newKind = kindSel.value;
      const kindChanged = newKind !== r.kind;
      state.recurring=state.recurring.map(x=>x.id===rid?{...x,
        kind: newKind,
        type: tsr.value,
        catId: catSel.value,
        label: li.value.trim(),
        amount: a,
        dayOfMonth: parseInt(di.value)||x.dayOfMonth,
        dateFin: dfi.value||null,
        cbDiff: newKind==="expense" && cbInp.checked
      }:x);
      // Si le kind a changé : nettoyer les transactions injectées (revenus + dépenses) et regénérer
      if(kindChanged){
        state.expenses = state.expenses.filter(e=>e.fromRecurring!==rid);
        state.incomes  = state.incomes.filter(i=>i.fromRecurring!==rid);
      } else {
        // Sinon, juste propager le changement de cbDiff aux transactions du mois
        state.expenses = state.expenses.map(e=>e.fromRecurring===rid?{...e,cbDiff: newKind==="expense" && cbInp.checked}:e);
      }
      saveState(); injectRecurring(); render(); closeDrawer(); notify("Récurrent modifié ✅");
    }));
    li.focus(); dc.appendChild(f);
  }
  else if(type==="addvirement"){
    const t=div("drawer-title"); t.textContent="Virement CB → Revolut"; dc.appendChild(t);
    const f=div("form-col");
    const ai=mkInp("number","0");
    const ni=mkInp("text","Note…","");
    const di=mkInp("date","",today());
    f.appendChild(mkField("Montant (€)",ai));
    f.appendChild(mkField("Note (optionnel)",ni));
    f.appendChild(mkField("Date",di));
    f.appendChild(mkFooter("Ajouter","btn-orange",()=>{
      const a=parseFloat(ai.value); if(!a||a<=0) return;
      if(!state.revolut_virements) state.revolut_virements=[];
      state.revolut_virements.push({id:uid(),amount:a,note:ni.value||"Virement Revolut",date:di.value||today()});
      saveState(); const pg=document.getElementById("page-plafond"); if(pg&&!pg.classList.contains("hidden"))renderPlafond(pg);
      closeDrawer(); notify("Virement enregistré 💳");
    }));
    ai.focus(); dc.appendChild(f);
  }
  else if(type.startsWith("editincome:")){
    const xid=type.slice(11); const x=state.incomes.find(i=>i.id===xid); if(!x){closeDrawer();return;}
    const t=div("drawer-title"); t.textContent="Modifier le revenu"; dc.appendChild(t);
    const f=div("form-col");
    const ai=mkInp("number","0",String(x.amount));
    const ni=mkInp("text","Note…",x.note||"");
    const di=mkInp("date","",x.date);
    if(!state.incomeTypes||!state.incomeTypes.length)state.incomeTypes=[...DEFAULT_INCOME_TYPES];
    const ti=mkSel(state.incomeTypes,x.type||state.incomeTypes[0]);
    f.appendChild(mkField("Montant (€)",ai));
    f.appendChild(mkField("Type",ti));
    f.appendChild(mkField("Note",ni));
    f.appendChild(mkField("Date",di));
    f.appendChild(mkFooter("Enregistrer","btn-green",()=>{
      const a=parseFloat(ai.value); if(!a||a<=0) return;
      state.incomes=state.incomes.map(i=>i.id===xid?{...i,amount:a,type:ti.value,note:ni.value,date:di.value||i.date}:i);
      saveState(); render(); closeDrawer(); notify("Revenu modifié ✅");
    }));
    ai.focus(); dc.appendChild(f);
  }
  else if(type.startsWith("editexpense:")){
    const xid=type.slice(12); const x=state.expenses.find(e=>e.id===xid); if(!x){closeDrawer();return;}
    const t=div("drawer-title"); t.textContent="Modifier la dépense"; dc.appendChild(t);
    const f=div("form-col");
    const ai=mkInp("number","0",String(x.amount));
    const li=mkInp("text","Label…",x.label||"");
    const di=mkInp("date","",x.date);
    const ci=mkSel(cats.map(c=>({value:c.id,label:c.icon+" "+c.label})),x.catId||cats[0]?.id);
    const cbCheck=el("div"); cbCheck.style.cssText="display:flex;align-items:center;gap:.6rem;";
    const cbInp=el("input"); cbInp.type="checkbox"; cbInp.checked=!!x.cbDiff; cbInp.style.cssText="width:18px;height:18px;accent-color:#f48c06;cursor:pointer;";
    const cbLbl=el("label"); cbLbl.style.cssText="font-size:.85rem;color:#e8e0f8;text-transform:none;letter-spacing:0;"; cbLbl.textContent="💳 Achat CB différée (Revolut)";
    cbCheck.appendChild(cbInp); cbCheck.appendChild(cbLbl);
    f.appendChild(mkField("Montant (€)",ai));
    f.appendChild(mkField("Catégorie",ci));
    f.appendChild(mkField("Label",li));
    f.appendChild(mkField("Date",di));
    f.appendChild(cbCheck);
    f.appendChild(mkFooter("Enregistrer","btn-orange",()=>{
      const a=parseFloat(ai.value); if(!a||a<=0) return;
      state.expenses=state.expenses.map(e=>e.id===xid?{...e,amount:a,catId:ci.value,label:li.value,date:di.value||e.date,cbDiff:cbInp.checked}:e);
      saveState(); render(); closeDrawer(); notify("Dépense modifiée ✅");
    }));
    ai.focus(); dc.appendChild(f);
  }
  else if(type==="reconcileMain"){
    // Solde théorique du compte principal aujourd'hui
    const todayStr2=today();
    const dateRef3=state.soldeDateRef||todayStr2;
    const incAujourd=state.incomes.filter(x=>x.date>dateRef3&&x.date<=todayStr2&&!x.cbRevolut).reduce((a,x)=>a+(x.amount||0),0);
    const expAujourd=state.expenses.filter(x=>x.date>dateRef3&&x.date<=todayStr2&&!x.cbDiff).reduce((a,x)=>a+(x.amount||0),0);
    const theoriqueMain=(state.soldeDepart||0)+incAujourd-expAujourd;

    const t=div("drawer-title"); t.textContent="🔧 Réconcilier compte principal"; dc.appendChild(t);
    const sub=el("div"); sub.style.cssText="font-size:.82rem;color:#8080a0;margin-bottom:1.2rem;line-height:1.55;";
    sub.innerHTML=`Solde théorique aujourd'hui&nbsp;: <strong style="color:#f48c06;">${fmt(theoriqueMain)}</strong><br><span style="color:#505070;">Tape ton vrai solde bancaire — l'app va recaler le solde de référence à aujourd'hui. L'historique est conservé.</span>`;
    dc.appendChild(sub);

    const f=div("form-col");
    const reelInp=mkInp("number","ex: 1234.56",""); reelInp.step="0.01";
    const previewDiv=el("div"); previewDiv.style.cssText="font-size:.85rem;padding:.8rem;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-top:.3rem;display:none;";

    reelInp.addEventListener("input",()=>{
      const reel=parseFloat(reelInp.value);
      if(isNaN(reel)){ previewDiv.style.display="none"; return; }
      const ecart=reel-theoriqueMain;
      previewDiv.style.display="";
      if(Math.abs(ecart)<0.01){ previewDiv.innerHTML="✅ Aucun écart — la date sera juste recalée à aujourd&rsquo;hui"; previewDiv.style.color='#10b981'; }
      else if(ecart>0){ previewDiv.innerHTML=`📥 Écart de <strong>+${fmt(ecart)}</strong> absorbé dans le nouveau solde de référence`; previewDiv.style.color='#10b981'; }
      else { previewDiv.innerHTML=`📤 Écart de <strong>${fmt(ecart)}</strong> absorbé dans le nouveau solde de référence`; previewDiv.style.color='#f87171'; }
    });

    f.appendChild(mkField("Solde réel banque (€)",reelInp));
    f.appendChild(previewDiv);
    f.appendChild(mkFooter("Réconcilier","btn-orange",()=>{
      const reel=parseFloat(reelInp.value);
      if(isNaN(reel)) return;
      // On recale en datant la référence à la veille, pour que les opérations du jour
      // (ex: virements reçus ou payés aujourd'hui) soient bien comptées en plus.
      const d=new Date(); d.setDate(d.getDate()-1);
      const yest=d.toISOString().slice(0,10);
      // Re-calculer le théorique pour la veille (transactions <= veille)
      const incVeille=state.incomes.filter(x=>x.date>(state.soldeDateRef||"")&&x.date<=yest).reduce((a,x)=>a+(x.amount||0),0);
      const expVeille=state.expenses.filter(x=>x.date>(state.soldeDateRef||"")&&x.date<=yest&&!x.cbDiff).reduce((a,x)=>a+(x.amount||0),0);
      const theoriqueVeille=(state.soldeDepart||0)+incVeille-expVeille;
      // Solde de la veille = solde réel d'aujourd'hui − transactions du jour
      const incToday=state.incomes.filter(x=>x.date===today()).reduce((a,x)=>a+(x.amount||0),0);
      const expToday=state.expenses.filter(x=>x.date===today()&&!x.cbDiff).reduce((a,x)=>a+(x.amount||0),0);
      const soldeVeille=reel-incToday+expToday;
      state.soldeDepart=soldeVeille;
      state.soldeDateRef=yest;
      saveState(); render(); closeDrawer(); notify("✅ Compte recalé");
    }));
    reelInp.focus(); dc.appendChild(f);
  }
  else if(type==="reconcile"){
    // Solde théorique Revolut = virements du mois − achats cbDiff + crédits cbRevolut
    const m = thisM();
    const virementsM = (state.revolut_virements||[]).filter(v=>v.date.startsWith(m));
    const totalVir = virementsM.reduce((s,v)=>s+(v.amount||0),0);
    const cbDiffTotal = state.expenses.filter(e=>e.cbDiff).reduce((s,e)=>s+(e.amount||0),0);
    const cbCredits = state.incomes.filter(i=>i.cbRevolut).reduce((s,i)=>s+(i.amount||0),0);
    const theorique = totalVir - cbDiffTotal + cbCredits;

    const t=div("drawer-title"); t.textContent="🔧 Réconcilier Revolut"; dc.appendChild(t);
    const sub=el("div"); sub.style.cssText="font-size:.82rem;color:#8080a0;margin-bottom:1.2rem;line-height:1.55;";
    sub.innerHTML=`Solde théorique calculé&nbsp;: <strong style="color:#f48c06;">${fmt(theorique)}</strong><br><span style="color:#505070;">Tape ton vrai solde Revolut, l'app va créer une ligne d'ajustement.</span>`;
    dc.appendChild(sub);

    const f=div("form-col");
    const reelInp=mkInp("number","ex: 56.84",""); reelInp.step="0.01";
    const noteInp=mkInp("text","Ajustement Revolut","Ajustement Revolut");
    const dateInp=mkInp("date","",today());
    const previewDiv=el("div"); previewDiv.style.cssText="font-size:.85rem;padding:.8rem;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin-top:.3rem;display:none;";

    const updatePreview=()=>{
      const reel=parseFloat(reelInp.value);
      if(isNaN(reel)){ previewDiv.style.display="none"; return; }
      const ecart=reel-theorique;
      previewDiv.style.display="";
      if(Math.abs(ecart)<0.01){ previewDiv.innerHTML='✅ Aucun écart, rien à faire'; previewDiv.style.color='#10b981'; }
      else if(ecart>0){ previewDiv.innerHTML=`📥 Crédit de <strong>${fmt(ecart)}</strong> sera ajouté (cbRevolut)`; previewDiv.style.color='#10b981'; }
      else { previewDiv.innerHTML=`📤 Dépense de <strong>${fmt(-ecart)}</strong> sera ajoutée (cbDiff)`; previewDiv.style.color='#f87171'; }
    };
    reelInp.addEventListener("input",updatePreview);

    f.appendChild(mkField("Solde réel Revolut (€)",reelInp));
    f.appendChild(mkField("Note",noteInp));
    f.appendChild(mkField("Date",dateInp));
    f.appendChild(previewDiv);
    f.appendChild(mkFooter("Réconcilier","btn-orange",()=>{
      const reel=parseFloat(reelInp.value);
      if(isNaN(reel)) return;
      const ecart=reel-theorique;
      if(Math.abs(ecart)<0.01){ closeDrawer(); notify("Aucun écart à corriger"); return; }
      const note=noteInp.value.trim()||"Ajustement Revolut";
      const dt=dateInp.value||today();
      if(ecart>0){
        state.incomes.push({id:uid(),amount:ecart,type:"💳 Revolut",note:note,date:dt,cbRevolut:true});
      } else {
        const cats2=getCats();
        const catId=(cats2.find(c=>c.id==="autre")||cats2[0]).id;
        state.expenses.push({id:uid(),amount:-ecart,catId:catId,label:note,date:dt,cbDiff:true});
      }
      saveState(); render(); closeDrawer(); notify("✅ Réconcilié");
    }));
    reelInp.focus(); dc.appendChild(f);
  }
  else if(type==="arrondis"){
    const t=div("drawer-title"); t.textContent="🪙 Arrondis RevPoints"; dc.appendChild(t);
    const sub=el("div"); sub.style.cssText="font-size:.82rem;color:#8080a0;margin-bottom:1.2rem;line-height:1.55;";
    sub.textContent="Saisis le total des arrondis RevPoints du mois en une seule ligne (cbDiff).";
    dc.appendChild(sub);
    const f=div("form-col");
    const ai=mkInp("number","0"); ai.step="0.01";
    const di=mkInp("date","",today());
    f.appendChild(mkField("Montant total (€)",ai));
    f.appendChild(mkField("Date",di));
    f.appendChild(mkFooter("Ajouter","btn-orange",()=>{
      const a=parseFloat(ai.value); if(!a||a<=0) return;
      const cats2=getCats();
      const catId=(cats2.find(c=>c.id==="autre")||cats2[0]).id;
      state.expenses.push({id:uid(),amount:a,catId:catId,label:"🪙 Arrondis RevPoints",date:di.value||today(),cbDiff:true});
      saveState(); render(); closeDrawer(); notify("Arrondis ajoutés ✅");
    }));
    ai.focus(); dc.appendChild(f);
  }
}

/* ════════════════════════════════════
   RENDER + NAV
════════════════════════════════════ */
function render(){
  const cv=computed();
  document.getElementById("hdr-sub").textContent=monthLbl();
  ["dashboard","cashflow","plafond","debts","projection","settings"].forEach(p=>{
    const pg=document.getElementById("page-"+p);
    if(p===currentTab) pg.classList.remove("hidden"); else pg.classList.add("hidden");
  });
  const c=document.getElementById("page-"+currentTab);
  if(currentTab==="dashboard")  renderDashboard(c);
  if(currentTab==="cashflow")   renderCashflow(c);
  if(currentTab==="plafond")    renderPlafond(c);
  if(currentTab==="debts")      renderDebts(c);
  if(currentTab==="projection") renderProjection(c);
  if(currentTab==="settings")   renderSettings(c);
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".nav-item").forEach(i=>{ i.classList.remove("active"); if(i.dataset.tab===tab) i.classList.add("active"); });
  render();
}

document.querySelectorAll(".nav-item").forEach(item=>{
  item.addEventListener("click",function(){ switchTab(this.dataset.tab); });
});

/* ── Init ── */
function quickSave(){
  const data=JSON.stringify(state,null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="budget-sauvegarde.json";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  const btn=document.getElementById("btn-save-quick");
  btn.style.opacity="1"; setTimeout(()=>btn.style.opacity=".35",1000);
  notify("💾 Sauvegardé !");
}
loadState();
injectRecurring();
render();
switchTab("dashboard");
</script>
</body>
</html>
