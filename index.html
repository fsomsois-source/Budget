<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#08080d;font-family:'Epilogue',sans-serif;color:#e8e0f8;-webkit-font-smoothing:antialiased;min-height:100vh;}

<!-- Firebase SDKs -->
<script>
/* ── Default categories ── */
const DEFAULT_CATS = [
  {id:"logement",  label:"Logement",     icon:"🏠", weight:30},
  {id:"alim",      label:"Alimentation", icon:"🛒", weight:20},
  {id:"transport", label:"Transport",    icon:"🚗", weight:12},
  {id:"sante",     label:"Santé",        icon:"💊", weight:8},
  {id:"abos",      label:"Abonnements",  icon:"📱", weight:7},
  {id:"loisirs",   label:"Loisirs",      icon:"🎉", weight:10},
  {id:"vetements", label:"Vêtements",    icon:"👗", weight:6},
  {id:"autre",     label:"Autre",        icon:"📦", weight:7},
];
const DEBT_ICONS   = ["💳","🏦","🚗","🏥","📱","🏠","🎓","💼","⚡","👨‍👩‍👧"];
const DEFAULT_INCOME_TYPES = ["💼 Freelance","🏆 Prime","🎁 Virement","📈 Investissement","🤝 Aide","💰 Autre"];
const CAT_ICONS    = ["🏠","🛒","🚗","💊","📱","🎉","👗","📦","🍽️","🎓","💡","🏋️","🐶","🌿","🎮","✈️","🏖️","💈","🎨","🧴","🧸","🏥","📚","🎵","🔧","🛍️","💻","📸"];

/* ── State ── */
let state = {incomes:[], expenses:[], debts:[], recurring:[], cats: DEFAULT_CATS.map(c=>({...c})), incomeTypes: [...DEFAULT_INCOME_TYPES], soldeDepart: 0, limiteCBDiff: 0, jourBascule: 20};
let currentTab = "dashboard";
let simVal     = 80;
let toastTimer = null;
let saveTimer  = null;

/* ── LocalStorage ── */
function saveState(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try { localStorage.setItem("budget_data", JSON.stringify(state)); } catch(e){}
  }, 400);
}

function loadState(){
  try {
    const raw = localStorage.getItem("budget_data");
    if(raw){ state = Object.assign({incomes:[],expenses:[],debts:[],recurring:[],cats:DEFAULT_CATS.map(c=>({...c})),incomeTypes:[...DEFAULT_INCOME_TYPES],soldeDepart:0,limiteCBDiff:0,jourBascule:20}, JSON.parse(raw)); }
    if(!state.cats||!state.cats.length) state.cats = DEFAULT_CATS.map(c=>({...c}));
    if(!state.incomeTypes||!state.incomeTypes.length) state.incomeTypes = [...DEFAULT_INCOME_TYPES];
  } catch(e){}
}

/* ── Helpers ── */
const fmt    = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n||0);
const fmtD   = iso => { try{ return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}); }catch(e){ return ""; } };
const uid    = () => Math.random().toString(36).slice(2,9);
const today  = () => new Date().toISOString().slice(0,10);
const thisM  = () => new Date().toISOString().slice(0,7);
const monthOf= off => { const d=new Date(); d.setMonth(d.getMonth()+(off||0)); return d.toISOString().slice(0,7); };
const monthLbl=off => { const d=new Date(); d.setMonth(d.getMonth()+(off||0)); return d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"}); };
const clamp  = (v,a,b) => Math.max(a,Math.min(b,v));
const barCol = pct => pct>100?"linear-gradient(90deg,#ef4444,#f87171)":pct>85?"linear-gradient(90deg,#d97706,#facc15)":"linear-gradient(90deg,#059669,#10b981)";
const sumOf  = (arr,m) => arr.filter(x=>(x.date||"").startsWith(m||thisM())).reduce((a,x)=>a+(x.amount||0),0);
const getCats= () => state.cats && state.cats.length ? state.cats : DEFAULT_CATS.map(c=>({...c}));

/* ── Recurring injection ── */
function injectRecurring(){
  if(!state.recurring||!state.recurring.length) return;
  const m = thisM();
  let changed = false;
  state.recurring.forEach(r => {
    const tag = r.id+":"+m;
    const isExpense = r.kind === "expense";
    const alreadyDone = isExpense
      ? state.expenses.some(x=>x.recurringTag===tag)
      : state.incomes.some(x=>x.recurringTag===tag);
    if(alreadyDone) return;
    const count = r.frequency==="weekly"?4:1;
    for(let i=0;i<count;i++){
      const d = new Date();
      if(r.frequency==="weekly") d.setDate(1+(i*7));
      else d.setDate(Math.min(r.dayOfMonth||1,28));
      if(isExpense){
        state.expenses.push({id:uid(),amount:r.amount,catId:r.catId||"autre",
          label:(r.label)+(count>1?` (sem.${i+1})`:"")+` 🔄`,
          date:d.toISOString().slice(0,10),recurringTag:tag,fromRecurring:r.id});
      } else {
        state.incomes.push({id:uid(),amount:r.amount,type:r.type||"💰 Autre",
          note:(r.label||r.type)+(count>1?` (sem.${i+1})`:"")+` 🔄`,
          date:d.toISOString().slice(0,10),recurringTag:tag,fromRecurring:r.id});
      }
      changed=true;
    }
  });
  if(changed) saveState();
}

/* ── Plafond engine ── */
function computePlafond(avgIncome, totalDebt){
  if(avgIncome<=0) return null;
  const securite = Math.round(avgIncome*0.05);
  const decouvBase = Math.max(0, -(state.soldeDepart||0));
  const ratio    = totalDebt>0?totalDebt/avgIncome:0;
  let debtPct, vitesse;
  if(ratio===0){     debtPct=0;    vitesse="libre"; }
  else if(ratio<=3){ debtPct=0.40; vitesse="rapide"; }
  else if(ratio<=8){ debtPct=0.28; vitesse="modérée"; }
  else {             debtPct=0.18; vitesse="soutenable"; }
  let allocation = Math.round(avgIncome*debtPct);
  // Déduire le découvert du plafond disponible
  let plafond    = Math.max(0, avgIncome-allocation-securite-decouvBase);
  if(plafond > 0 && plafond < avgIncome*0.40 && decouvBase===0){ plafond=Math.round(avgIncome*0.40); allocation=Math.max(0,avgIncome-plafond-securite); }
  const mthFree  = allocation>0&&totalDebt>0?Math.ceil(totalDebt/allocation):null;
  const dateFree = mthFree?(()=>{const d=new Date();d.setMonth(d.getMonth()+mthFree);return d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});})():null;
  const cats     = getCats();
  const totW     = cats.reduce((a,c)=>a+c.weight,0);
  const catPlafonds = {};
  cats.forEach(c=>{ catPlafonds[c.id]=Math.round(plafond*c.weight/totW); });
  return {plafond,allocation,securite,vitesse,ratio,mthFree,dateFree,catPlafonds,decouvBase};
}

/* ── Computed ── */
function computed(){
  const m         = thisM();
  const cats      = getCats();
  const todayStr  = today();
  const monthIncome  = sumOf(state.incomes,m);
  const monthDebtPay = sumOf(state.expenses.filter(e=>e.catId==="dettes"),m);
  const monthExpense = sumOf(state.expenses.filter(e=>e.catId!=="dettes"),m);
  // Solde actuel = solde de départ uniquement (photo du compte maintenant)
  const balance      = (state.soldeDepart||0);
  const spentByCat   = {};
  cats.forEach(c=>{ spentByCat[c.id]=state.expenses.filter(e=>e.catId===c.id&&(e.date||"").startsWith(m)).reduce((a,x)=>a+x.amount,0); });
  const totalDebt    = state.debts.reduce((a,d)=>a+(d.remaining||0),0);
  const totalOrig    = state.debts.reduce((a,d)=>a+(d.total||0),0);
  const inc3         = [0,1,2].map(i=>sumOf(state.incomes,monthOf(-i))).filter(v=>v>0);
  const avgIncome    = inc3.length?inc3.reduce((a,v)=>a+v,0)/inc3.length:monthIncome;
  const plafondData  = computePlafond(avgIncome,totalDebt);
  const savable      = plafondData?plafondData.allocation:0;
  const simExp       = plafondData?plafondData.plafond*(simVal/100):0;
  const simAlloc     = Math.max(0,avgIncome-simExp-(plafondData?plafondData.securite:0));
  const simMonths    = simAlloc>0&&totalDebt>0?Math.ceil(totalDebt/simAlloc):null;
  const simDate      = simMonths?(()=>{const d=new Date();d.setMonth(d.getMonth()+simMonths);return d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});})():null;
  const simGain      = (plafondData&&plafondData.mthFree&&simMonths)?plafondData.mthFree-simMonths:0;
  const projData     = Array.from({length:13},(_,i)=>({m:i===0?"Auj.":"M+"+i,actuel:Math.max(0,Math.round(totalDebt-savable*i)),simulation:Math.max(0,Math.round(totalDebt-simAlloc*i))}));
  const barData      = Array.from({length:5},(_,i)=>{const bd=new Date();bd.setMonth(bd.getMonth()-4+i);const bmm=bd.toISOString().slice(0,7);return{m:bd.toLocaleDateString("fr-FR",{month:"short"}),revenus:sumOf(state.incomes,bmm),depenses:state.expenses.filter(e=>(e.date||"").startsWith(bmm)).reduce((a,x)=>a+x.amount,0)};});
  const recentTx     = [...state.incomes.map(x=>({...x,_k:"in"})),...state.expenses.map(x=>({...x,_k:"out"}))].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);
  return {monthIncome,monthDebtPay,monthExpense,balance,spentByCat,totalDebt,totalOrig,avgIncome,plafondData,savable,simAlloc,simMonths,simDate,simGain,projData,barData,recentTx};
}

/* ── DOM helpers ── */
function notify(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.remove("hidden"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.add("hidden"),2800); }
function el(tag,cs,st,ch){ const e=document.createElement(tag); if(cs) e.className=cs; if(st) Object.assign(e.style,st); if(ch){ (Array.isArray(ch)?ch:[ch]).forEach(c=>{ if(c==null) return; if(typeof c==="string"||typeof c==="number") e.appendChild(document.createTextNode(c)); else e.appendChild(c); }); } return e; }
function div(cs,st,ch){ return el("div",cs,st,ch); }
function span(txt,st){ const s=el("span"); s.textContent=txt; if(st) Object.assign(s.style,st); return s; }
function btn(label,cls,onClick){ const b=el("button","btn "+(cls||"btn-ghost")); b.innerHTML=label; if(onClick) b.addEventListener("click",onClick); return b; }
function makeProgress(pct,color,h){ h=h||8; const tr=div("ptrack",{height:h+"px"}); const fi=div("pfill",{width:clamp(pct,0,100)+"%",background:color||"linear-gradient(90deg,#e85d04,#f48c06)"}); tr.appendChild(fi); return tr; }

/* ── SVG Charts ── */
function makeAreaChart(data,keyA,keyB,cA,cB,h){
  cA=cA||"#e85d04"; cB=cB||"#10b981"; h=h||160;
  if(!data||data.length<2) return document.createTextNode("");
  const ns="http://www.w3.org/2000/svg",W=340,H=h,pl=44,pr=10,pt=10,pb=28,iW=W-pl-pr,iH=H-pt-pb;
  const allV=[...data.map(d=>d[keyA]||0),...(keyB?data.map(d=>d[keyB]||0):[])];
  const maxV=Math.max(...allV,1);
  const xP=i=>pl+(i/(data.length-1))*iW;
  const yP=v=>pt+iH-(v/maxV)*iH;
  const pathD=key=>data.map((d,i)=>`${i===0?"M":"L"}${xP(i).toFixed(1)},${yP(d[key]||0).toFixed(1)}`).join(" ");
  const areaD=key=>`${pathD(key)} L${xP(data.length-1).toFixed(1)},${(pt+iH).toFixed(1)} L${pl},${(pt+iH).toFixed(1)} Z`;
  const svg=document.createElementNS(ns,"svg"); svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.style.cssText=`width:100%;height:${H}px;`;
  const defs=document.createElementNS(ns,"defs");
  const mkG=(id,c,o)=>{ const g=document.createElementNS(ns,"linearGradient"); g.setAttribute("id",id); ["x1","y1","x2","y2"].forEach((k,i)=>g.setAttribute(k,["0","0","0","1"][i])); [{o:"0%",op:o},{o:"100%",op:"0"}].forEach(({o:off,op})=>{ const s=document.createElementNS(ns,"stop"); s.setAttribute("offset",off); s.setAttribute("stop-color",c); s.setAttribute("stop-opacity",op); g.appendChild(s); }); return g; };
  const idA="lgA"+Math.random().toString(36).slice(2,6),idB="lgB"+Math.random().toString(36).slice(2,6);
  defs.appendChild(mkG(idA,cA,"0.28")); if(keyB) defs.appendChild(mkG(idB,cB,"0.2")); svg.appendChild(defs);
  [0,.5,1].forEach(r=>{ const v=Math.round(maxV*r),y=yP(maxV*r); const ln=document.createElementNS(ns,"line"); ["x1","y1","x2","y2","stroke","stroke-width"].forEach((k,i)=>[pl,y,W-pr,y,"rgba(255,255,255,.05)","1"].forEach((v2,j)=>i===j&&ln.setAttribute(k,v2))); svg.appendChild(ln); const t=document.createElementNS(ns,"text"); t.setAttribute("x",pl-4); t.setAttribute("y",y+4); t.setAttribute("text-anchor","end"); t.setAttribute("fill","#505070"); t.setAttribute("font-size","9"); t.textContent=v>=1000?Math.round(v/1000)+"k":v; svg.appendChild(t); });
  const addA=(key,gid,col,dash)=>{ const a=document.createElementNS(ns,"path"); a.setAttribute("d",areaD(key)); a.setAttribute("fill",`url(#${gid})`); svg.appendChild(a); const p=document.createElementNS(ns,"path"); p.setAttribute("d",pathD(key)); p.setAttribute("fill","none"); p.setAttribute("stroke",col); p.setAttribute("stroke-width","2"); p.setAttribute("stroke-linejoin","round"); if(dash) p.setAttribute("stroke-dasharray","5,3"); svg.appendChild(p); };
  addA(keyA,idA,cA,false); if(keyB) addA(keyB,idB,cB,true);
  [0,Math.floor((data.length-1)/2),data.length-1].forEach(i=>{ const t=document.createElementNS(ns,"text"); t.setAttribute("x",xP(i)); t.setAttribute("y",H-6); t.setAttribute("text-anchor","middle"); t.setAttribute("fill","#505070"); t.setAttribute("font-size","9"); t.textContent=(data[i]&&data[i].m)||""; svg.appendChild(t); });
  return svg;
}
function makeBarChart(data,h){
  h=h||130; if(!data||!data.length) return document.createTextNode("");
  const ns="http://www.w3.org/2000/svg",W=340,H=h,pl=10,pr=8,pt=8,pb=24,iW=W-pl-pr,iH=H-pt-pb;
  const maxV=Math.max(...data.map(d=>Math.max(d.revenus||0,d.depenses||0)),1);
  const bw=Math.floor(iW/data.length*0.32),gap=iW/data.length;
  const svg=document.createElementNS(ns,"svg"); svg.setAttribute("viewBox",`0 0 ${W} ${H}`); svg.style.cssText=`width:100%;height:${H}px;`;
  data.forEach((d,i)=>{ const cx=pl+gap*i+gap/2,hR=((d.revenus||0)/maxV)*iH,hD=((d.depenses||0)/maxV)*iH; const mk=(x,y,w,h2,fill)=>{ const r=document.createElementNS(ns,"rect"); [["x",x],["y",y],["width",w],["height",Math.max(h2,1)],["fill",fill],["rx","3"]].forEach(([k,v])=>r.setAttribute(k,v)); svg.appendChild(r); }; mk(cx-bw-1,pt+iH-hR,bw,hR,"#10b981"); mk(cx+1,pt+iH-hD,bw,hD,"#f87171"); const t=document.createElementNS(ns,"text"); t.setAttribute("x",cx); t.setAttribute("y",H-6); t.setAttribute("text-anchor","middle"); t.setAttribute("fill","#505070"); t.setAttribute("font-size","9"); t.textContent=d.m; svg.appendChild(t); });
  return svg;
}

function renderDashboard(c){
  c.innerHTML="";

  const ss=el("div"); ss.style.cssText="font-size:.78rem;color:#505070;margin-top:.3rem;"; ss.textContent=`Base ${fmt(state.soldeDepart||0)} · encaissé à ce jour`; sc.appendChild(ss); c.appendChild(sc);

    const pd=cv.plafondData;
    const limite=state.limiteCBDiff||0;
    const jourBascule=state.jourBascule||20;
    // Calcul des dépenses depuis le dernier jour de bascule
    const now=new Date();
    const basculeDate=new Date(now.getFullYear(), now.getMonth(), jourBascule);
    if(basculeDate>now) basculeDate.setMonth(basculeDate.getMonth()-1);
    const depuisBascule=state.expenses.filter(x=>new Date(x.date)>=basculeDate).reduce((a,x)=>a+(x.amount||0),0);
    const solde=state.soldeDepart||0;
    const ajustement=solde<0?Math.abs(solde):0;
    const resteDebit=limite>0
      ? Math.max(0, limite-depuisBascule)
      : Math.max(0, pd.plafond-depuisBascule-ajustement);
    const ddc=div("card",{padding:"1.2rem",background:"rgba(232,93,4,.06)",border:"1px solid rgba(232,93,4,.2)"});
    const ddl=div("sec"); ddl.textContent="💳 Débit différé max ce mois"; ddc.appendChild(ddl);
    const ddv=el("div"); ddv.style.cssText="font-family:'Syne',sans-serif;font-size:2rem;font-weight:900;color:#f48c06;"; ddv.textContent=fmt(resteDebit); ddc.appendChild(ddv);
    const dds=el("div"); dds.style.cssText="font-size:.75rem;color:#505070;margin-top:.3rem;";
    dds.textContent=limite>0
      ? `Limite ${fmt(limite)} · dépensé depuis le ${jourBascule} : ${fmt(depuisBascule)}`
      : `Plafond ${fmt(pd.plafond)} · dépensé ${fmt(depuisBascule)}`;

    c.appendChild(ddc);
  }
  if(cv.avgIncome>0&&cv.plafondData){
    const pd=cv.plafondData,monthExp=cv.monthExpense,over=monthExp>pd.plafond;
    const ppc=div("card",{padding:"1.2rem",border:over?"1px solid rgba(239,68,68,.3)":"1px solid rgba(16,185,129,.2)",background:over?"rgba(239,68,68,.04)":"rgba(16,185,129,.04)"});

    ph.appendChild(phl); ph.appendChild(phr); ppc.appendChild(ph);

    c.appendChild(ppc);

    const dc=div("card",{padding:"1.1rem 1.2rem"}); const dh=div("",{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:".6rem"});
    const dl=div("sec"); dl.style.marginBottom="0"; dl.textContent="Dettes totales"; dh.appendChild(dl);
    if(cv.plafondData&&cv.plafondData.dateFree){ const df=el("div"); df.style.cssText="font-size:.72rem;color:#f48c06;font-weight:600;"; df.textContent="Liberté : "+cv.plafondData.dateFree; dh.appendChild(df); }
    dc.appendChild(dh);
    const dv=el("div"); dv.style.cssText="font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;margin-bottom:.7rem;"; dv.textContent=fmt(cv.totalDebt); dc.appendChild(dv);
    dc.appendChild(makeProgress(cv.totalOrig>0?((cv.totalOrig-cv.totalDebt)/cv.totalOrig)*100:0));
    const ds=el("div"); ds.style.cssText="font-size:.72rem;color:#505070;margin-top:.35rem;"; ds.textContent=`${fmt(cv.totalOrig-cv.totalDebt)} remboursé sur ${fmt(cv.totalOrig)}`; dc.appendChild(ds); c.appendChild(dc);

function makeTxRow(tx){
  const cats=getCats(); const cat=cats.find(c=>c.id===tx.catId);
  const row=div("tx");
  const ico=span(tx._k==="in"?(tx.type||"💰").split(" ")[0]:(cat&&cat.icon)||"💸"); ico.style.fontSize="1.2rem";
  const info=el("div"); info.style.cssText="flex:1;min-width:0;";
  const nm=el("div"); nm.style.cssText="font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"; nm.textContent=tx._k==="in"?(tx.note||tx.type):(tx.label||(cat&&cat.label)||"Dépense");
  const dt=el("div"); dt.style.cssText="font-size:.71rem;color:#505070;"; dt.textContent=fmtD(tx.date);
  info.appendChild(nm); info.appendChild(dt);
  const amt=span(`${tx._k==="in"?"+":"-"}${fmt(tx.amount)}`); amt.style.cssText=`font-weight:700;color:${tx._k==="in"?"#10b981":"#f87171"};font-size:.92rem;flex-shrink:0;`;
  row.appendChild(ico); row.appendChild(info); row.appendChild(amt);
  return row;
}

/* ════════════════════════════════════
   PAGE : TRÉSORERIE (projection jour par jour)
════════════════════════════════════ */
let tresoHorizon = 30;

function buildTresoEvents(days){
  const events = [];
  const today2 = new Date(); today2.setHours(0,0,0,0);

  // Transactions déjà saisies (passées et futures)
  state.incomes.forEach(x=>{
    const d=new Date(x.date); d.setHours(0,0,0,0);
    const diff=Math.round((d-today2)/(86400000));
    if(diff>=-30&&diff<=days) events.push({date:x.date,label:x.note||x.type,amount:x.amount,kind:"in",auto:!!x.fromRecurring});
  });
  state.expenses.forEach(x=>{
    const d=new Date(x.date); d.setHours(0,0,0,0);
    const diff=Math.round((d-today2)/(86400000));
    if(diff>=-30&&diff<=days) events.push({date:x.date,label:x.label||"Dépense",amount:-x.amount,kind:"out",auto:!!x.fromRecurring});
  });

  // Récurrents futurs
  state.recurring.forEach(r=>{
    for(let i=1;i<=days;i++){
      const d=new Date(today2); d.setDate(today2.getDate()+i);
      let shouldFire=false;
      if(r.frequency==="monthly"&&d.getDate()===(r.dayOfMonth||1)) shouldFire=true;
      if(r.frequency==="weekly"&&d.getDay()===1) shouldFire=true; // chaque lundi
      if(shouldFire){
        events.push({
          date:d.toISOString().slice(0,10),
          label:r.label,
          amount:r.kind==="expense"?-r.amount:r.amount,
          kind:r.kind==="expense"?"out":"in",
          auto:true
        });
      }
    }
  });

  events.sort((a,b)=>new Date(a.date)-new Date(b.date));
  return events;
}

function renderProjection(c){
  c.innerHTML="";

  // Sélecteur d'horizon
  const tabRow=div("",{display:"flex",gap:".5rem",marginBottom:"1rem"});
  [30,60,90].forEach(h=>{
    const tb=btn(h+" j","btn "+(tresoHorizon===h?"btn-orange":"btn-ghost"),()=>{ tresoHorizon=h; renderProjection(c); });
    tb.style.cssText="flex:1;padding:.55rem;font-size:.82rem;";
    tabRow.appendChild(tb);
  });
  c.appendChild(tabRow);

  const soldeAujourdhui = state.soldeDepart||0;
  const today2=new Date(); today2.setHours(0,0,0,0);
  const events=buildTresoEvents(tresoHorizon);
  const futureEvents=events.filter(ev=>new Date(ev.date)>today2);

  // Solde actuel
  const sc=div("card",{padding:"1rem 1.2rem",marginBottom:".8rem"});
  sc.innerHTML=`<div class="sec" style="margin-bottom:.2rem;">Solde aujourd'hui</div><div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:900;color:${soldeAujourdhui>=0?"#10b981":"#f87171"};">${fmt(soldeAujourdhui)}</div>`;
  c.appendChild(sc);

  if(!futureEvents.length){
    const empty=div("card",{padding:"1.2rem",textAlign:"center",color:"#505070",fontSize:".85rem"});
    empty.textContent="Aucun événement prévu. Ajoute des récurrents dans Flux !";
    c.appendChild(empty);
    return;
  }

  // Tableau
  const tableWrap=div("card",{padding:"0",overflowX:"hidden"});
  const table=el("table"); table.style.cssText="width:100%;border-collapse:collapse;font-size:.82rem;";

  // Header
  const thead=el("thead");
  const trh=el("tr"); trh.style.cssText="background:#1a1a2e;";
  ["Date","Événement","Montant","Solde"].forEach((h,i)=>{
    const th=el("th"); th.textContent=h;
    th.style.cssText=`padding:.6rem .8rem;color:#8080a0;font-weight:600;text-transform:uppercase;font-size:.65rem;letter-spacing:.06em;text-align:${i>=2?"right":"left"};border-bottom:1px solid rgba(255,255,255,.08);`;
    trh.appendChild(th);
  });
  thead.appendChild(trh); table.appendChild(thead);

  const tbody=el("tbody");
  let runBal=soldeAujourdhui;
  futureEvents.forEach((ev,idx)=>{
    runBal+=ev.amount;
    const tr=el("tr"); tr.style.cssText=`border-bottom:1px solid rgba(255,255,255,.04);background:${idx%2===1?"rgba(255,255,255,.02)":"transparent"};`;

    // Date
    const d=new Date(ev.date);
    const tdDate=el("td"); tdDate.style.cssText="padding:.55rem .8rem;color:#8080a0;font-size:.75rem;white-space:nowrap;";
    tdDate.textContent=d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});

    // Label
    const tdLabel=el("td"); tdLabel.style.cssText="padding:.55rem .4rem;font-weight:600;color:#e8e0f8;";
    tdLabel.textContent=ev.label.replace(" 🔄","");

    // Montant
    const tdAmt=el("td"); tdAmt.style.cssText=`padding:.55rem .4rem;font-weight:700;text-align:right;white-space:nowrap;color:${ev.amount>=0?"#10b981":"#f87171"};`;
    tdAmt.textContent=(ev.amount>=0?"+":"")+fmt(Math.abs(ev.amount));

    // Solde
    const tdSolde=el("td"); tdSolde.style.cssText=`padding:.55rem .8rem;font-weight:700;text-align:right;white-space:nowrap;color:${runBal>=0?"#e8e0f8":"#f87171"};`;
    tdSolde.textContent=fmt(runBal);
    if(runBal<0) tdSolde.style.color="#f87171";

    tr.appendChild(tdDate); tr.appendChild(tdLabel); tr.appendChild(tdAmt); tr.appendChild(tdSolde);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  c.appendChild(tableWrap);

    const catId=cat.id; editBtn.addEventListener("click",()=>openDrawer("editcat:"+catId));
    const delBtn=el("button","btn-danger"); delBtn.textContent="✕"; delBtn.style.padding=".32rem .55rem";
    if(cats.length>2){ delBtn.addEventListener("click",()=>{ state.cats=state.cats.filter(c2=>c2.id!==catId); saveState(); render(); notify("Catégorie supprimée"); }); }
    else { delBtn.disabled=true; delBtn.style.opacity=".3"; }
    row.appendChild(ico); row.appendChild(nm); row.appendChild(wt); row.appendChild(editBtn); row.appendChild(delBtn);
    catCard.appendChild(row);
  });
  c.appendChild(catCard);
  c.appendChild(makeInfoBox("info-orange","Les poids déterminent la répartition du plafond entre catégories. Plus le poids est élevé, plus le budget alloué est important."));

  // Reset
  const resetCard=div("card",{padding:"1.1rem 1.2rem",marginTop:".5rem"});
  resetCard.appendChild(div("sec",{marginBottom:".8rem"})); resetCard.querySelector(".sec").textContent="Zone danger";
  const resetBtn=btn("🗑️ Réinitialiser toutes les données","btn btn-danger",()=>{
    if(confirm("Es-tu sûr ? Toutes tes données seront supprimées définitivement.")) {
      state={incomes:[],expenses:[],debts:[],recurring:[],cats:DEFAULT_CATS.map(c=>({...c}))};
      saveState(); render(); notify("Données réinitialisées");
    }
  }); resetBtn.style.width="100%"; resetCard.appendChild(resetBtn);
  c.appendChild(resetCard);
}

/* ════════════════════════════════════
   DRAWERS
════════════════════════════════════ */
function closeDrawer(){ document.getElementById("overlay").classList.add("hidden"); document.getElementById("drawer-content").innerHTML=""; }
function openDrawer(type){
  const ov=document.getElementById("overlay"),dc=document.getElementById("drawer-content");
  dc.innerHTML=""; ov.classList.remove("hidden");
  ov.onclick=e=>{ if(e.target===ov) closeDrawer(); };
  const cats=getCats();
  const mkField=(lbl,inp)=>{ const w=el("div"); const l=el("label"); l.textContent=lbl; w.appendChild(l); w.appendChild(inp); return w; };
  const mkInp=(t,ph,val)=>{ const i=el("input"); i.type=t||"text"; if(ph) i.placeholder=ph; if(val!==undefined&&val!=="") i.value=val; return i; };
  const mkSel=(opts,val)=>{ const s=el("select"); opts.forEach(o=>{ const opt=el("option"); if(typeof o==="object"){opt.value=o.value;opt.textContent=o.label;if(o.value===val)opt.selected=true;}else{opt.value=o;opt.textContent=o;if(o===val)opt.selected=true;} s.appendChild(opt); }); return s; };
  const mkFooter=(okLbl,okCls,okFn)=>{ const r=div("form-row"); const cb=btn("Annuler","btn btn-ghost",closeDrawer); cb.style.flex="1"; const ob=btn(okLbl||"OK","btn "+(okCls||"btn-orange"),okFn); ob.style.flex="1"; r.appendChild(cb); r.appendChild(ob); return r; };

  if(type==="income"){
    const t=div("drawer-title"); t.textContent="Nouveau revenu"; dc.appendChild(t);
    const f=div("form-col"); const ai=mkInp("number","0"),ts=mkSel(state.incomeTypes,state.incomeTypes[0]),ni=mkInp("text","Client X, prime…"),di=mkInp("date","",today());
    f.appendChild(mkField("Montant (€)",ai)); f.appendChild(mkField("Type",ts)); f.appendChild(mkField("Note",ni)); f.appendChild(mkField("Date",di));
    f.appendChild(mkFooter("Enregistrer","btn-green",()=>{ const a=parseFloat(ai.value); if(!a||a<=0) return; state.incomes.push({id:uid(),amount:a,type:ts.value,note:ni.value,date:di.value||today()}); saveState(); render(); closeDrawer(); notify("+"+fmt(a)+" enregistré 💰"); }));
    ai.focus(); dc.appendChild(f);
  }
  else if(type==="expense"){
    const t=div("drawer-title"); t.textContent="Nouvelle dépense"; dc.appendChild(t);
    const f=div("form-col"); const ai=mkInp("number","0"),cs=mkSel(cats.map(c=>({value:c.id,label:c.icon+" "+c.label})),cats[0]?.id),li=mkInp("text","Libellé…"),di=mkInp("date","",today());
    f.appendChild(mkField("Montant (€)",ai)); f.appendChild(mkField("Catégorie",cs)); f.appendChild(mkField("Libellé",li)); f.appendChild(mkField("Date",di));
    f.appendChild(mkFooter("Enregistrer","btn-orange",()=>{ const a=parseFloat(ai.value); if(!a||a<=0) return; state.expenses.push({id:uid(),amount:a,catId:cs.value,label:li.value,date:di.value||today()}); saveState(); render(); closeDrawer(); notify("-"+fmt(a)+" enregistré"); }));
    ai.focus(); dc.appendChild(f);
  }
  else if(type==="recurring"){
    const t=div("drawer-title"); t.textContent="Transaction récurrente"; dc.appendChild(t);
    const sr=el("div"); sr.style.cssText="font-size:.82rem;color:#505070;margin-bottom:1.2rem;"; sr.textContent="Ajouté automatiquement chaque mois ou chaque semaine."; dc.appendChild(sr);
    const f=div("form-col");
    const kindSel=mkSel([{value:"income",label:"💰 Revenu"},{value:"expense",label:"💸 Dépense"}],"income");
    const lr=mkInp("text","Ex : Loyer, Salaire…"),ar=mkInp("number","0");
    const tsr=mkSel(state.incomeTypes,state.incomeTypes[0]);
    const catSel=mkSel(cats.map(c=>({value:c.id,label:c.icon+" "+c.label})),cats[0]?.id);
    const typeWrap=mkField("Type de revenu",tsr);
    const catWrap=mkField("Catégorie",catSel); catWrap.style.display="none";
    kindSel.addEventListener("change",function(){
      if(this.value==="expense"){ typeWrap.style.display="none"; catWrap.style.display=""; }
      else { typeWrap.style.display=""; catWrap.style.display="none"; }
    });
    const freqr=mkSel([{value:"monthly",label:"Mensuel"},{value:"weekly",label:"Hebdomadaire (×4/mois)"}],"monthly"),dayr=mkInp("number","1");
    dayr.min="1"; dayr.max="28"; dayr.placeholder="Jour du mois (1-28)";
    const dayWrap=mkField("Jour du mois",dayr); freqr.addEventListener("change",function(){ dayWrap.style.display=this.value==="weekly"?"none":""; });
    f.appendChild(mkField("Type",kindSel)); f.appendChild(mkField("Libellé",lr)); f.appendChild(mkField("Montant (€)",ar)); f.appendChild(typeWrap); f.appendChild(catWrap); f.appendChild(mkField("Fréquence",freqr)); f.appendChild(dayWrap);
    f.appendChild(mkFooter("Enregistrer","btn-green",()=>{
      const a=parseFloat(ar.value); if(!a||a<=0||!lr.value.trim()) return;
      if(!state.recurring) state.recurring=[];
      const rec={id:uid(),label:lr.value.trim(),amount:a,kind:kindSel.value,type:tsr.value,catId:catSel.value,frequency:freqr.value,dayOfMonth:parseInt(dayr.value)||1};
      state.recurring.push(rec); saveState(); injectRecurring(); render(); closeDrawer(); notify("🔄 Récurrent ajouté !");
    }));
    lr.focus(); dc.appendChild(f);
  }
  else if(type==="debt"){
    const t=div("drawer-title"); t.textContent="Ajouter une dette"; dc.appendChild(t);
    const f=div("form-col"); const ni=mkInp("text","Crédit conso, loyer en retard…"),ti=mkInp("number","0"),nti=mkInp("text","Taux, créancier…");
    let selIco="💳"; const icoRow=el("div"); icoRow.style.cssText="display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem;";
    DEBT_ICONS.forEach(em=>{ const b=el("button","emo-btn"+(em==="💳"?" sel":"")); b.textContent=em; b.addEventListener("click",()=>{ selIco=em; icoRow.querySelectorAll(".emo-btn").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }); icoRow.appendChild(b); });
    const iw=el("div"); const il=el("label"); il.textContent="Icône"; iw.appendChild(il); iw.appendChild(icoRow);
    f.appendChild(mkField("Nom",ni)); f.appendChild(mkField("Montant total dû (€)",ti)); f.appendChild(mkField("Note",nti)); f.appendChild(iw);
    f.appendChild(mkFooter("Ajouter","btn-orange",()=>{ const t2=parseFloat(ti.value); if(!ni.value||!t2||t2<=0) return; state.debts.push({id:uid(),name:ni.value,total:t2,remaining:t2,icon:selIco,note:nti.value,payments:[]}); saveState(); render(); closeDrawer(); notify("Dette ajoutée 🎯"); }));
    ni.focus(); dc.appendChild(f);
  }
  else if(type.startsWith("pay:")){
    const did=type.slice(4); const debt=state.debts.find(d=>d.id===did); if(!debt){closeDrawer();return;}
    const t=div("drawer-title"); t.textContent="Remboursement"; dc.appendChild(t);
    const sub=el("div"); sub.style.cssText="font-size:.85rem;color:#505070;margin-bottom:1.2rem;"; sub.textContent=`${debt.icon} ${debt.name} · ${fmt(debt.remaining)} restant`; dc.appendChild(sub);
    const f=div("form-col"); const ai=mkInp("number","0"),ni=mkInp("text","Virement, prime…");
    f.appendChild(mkField("Montant (€)",ai)); f.appendChild(mkField("Note",ni));
    f.appendChild(mkFooter("💪 Valider","btn-orange",()=>{
      const a=parseFloat(ai.value); if(!a||a<=0) return;
      const paid=Math.min(a,debt.remaining);
      state.debts=state.debts.map(d=>{ if(d.id!==did) return d; const p={id:uid(),amount:paid,note:ni.value,date:today()}; const rem=Math.max(0,d.remaining-paid); if(rem===0) setTimeout(()=>notify("🎉 Dette soldée ! Bravo !"),100); else notify(`-${fmt(paid)} remboursé 💪`); return {...d,remaining:rem,payments:[...(d.payments||[]),p]}; });
      state.expenses.push({id:uid(),amount:paid,catId:"dettes",label:debt.name,date:today()});
      saveState(); render(); closeDrawer();
    }));
    ai.focus(); dc.appendChild(f);
  }
  else if(type==="addcat"||type.startsWith("editcat:")){
    const isEdit=type.startsWith("editcat:");
    const editCat=isEdit?cats.find(c=>c.id===type.slice(8)):null;
    const t=div("drawer-title"); t.textContent=isEdit?"Modifier la catégorie":"Nouvelle catégorie"; dc.appendChild(t);
    const f=div("form-col");
    const ni=mkInp("text","Ex : Épargne, Animaux, Cadeaux…",isEdit?editCat.label:"");
    const wi=mkInp("number","10",isEdit?String(editCat.weight):"10"); wi.min="1"; wi.max="100";
    let selIco=isEdit?editCat.icon:"📦";
    const icoRow=el("div"); icoRow.style.cssText="display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem;max-height:140px;overflow-y:auto;";
    CAT_ICONS.forEach(em=>{ const b=el("button","emo-btn"+(em===selIco?" sel":"")); b.textContent=em; b.addEventListener("click",()=>{ selIco=em; icoRow.querySelectorAll(".emo-btn").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); }); icoRow.appendChild(b); });
    const iw=el("div"); const il=el("label"); il.textContent="Icône"; iw.appendChild(il); iw.appendChild(icoRow);
    f.appendChild(mkField("Nom de la catégorie",ni));
    f.appendChild(mkField("Poids (part du budget, ex: 20 = 20%)",wi));
    f.appendChild(iw);
    f.appendChild(mkFooter(isEdit?"Enregistrer":"Ajouter","btn-orange",()=>{
      if(!ni.value.trim()) return;
      const wt=Math.max(1,parseInt(wi.value)||10);
      if(isEdit){
        state.cats=state.cats.map(c=>c.id===editCat.id?{...c,label:ni.value.trim(),icon:selIco,weight:wt}:c);
        notify("Catégorie modifiée ✅");
      } else {
        if(!state.cats) state.cats=DEFAULT_CATS.map(c=>({...c}));
        state.cats.push({id:uid(),label:ni.value.trim(),icon:selIco,weight:wt});
        notify("Catégorie ajoutée ✅");
      }
      saveState(); render(); closeDrawer();
    }));
    ni.focus(); dc.appendChild(f);
  }
}

/* ════════════════════════════════════
   RENDER + NAV
════════════════════════════════════ */
function render(){
  const cv=computed();
  document.getElementById("hdr-sub").textContent=monthLbl();
  const hd=document.getElementById("hdr-debt"); hd.textContent=fmt(cv.totalDebt); hd.style.color=cv.totalDebt===0?"#10b981":"#f48c06";
  ["dashboard","cashflow","plafond","debts","projection","settings"].forEach(p=>{
    const pg=document.getElementById("page-"+p);
    if(p===currentTab) pg.classList.remove("hidden"); else pg.classList.add("hidden");
  });
  const c=document.getElementById("page-"+currentTab);
  if(currentTab==="dashboard")  renderDashboard(c);
  if(currentTab==="cashflow")   renderCashflow(c);
  if(currentTab==="plafond")    renderPlafond(c);
  if(currentTab==="debts")      renderDebts(c);
  if(currentTab==="projection") renderProjection(c);
  if(currentTab==="settings")   renderSettings(c);
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".nav-item").forEach(i=>{ i.classList.remove("active"); if(i.dataset.tab===tab) i.classList.add("active"); });
  render();
}

document.querySelectorAll(".nav-item").forEach(item=>{
  item.addEventListener("click",function(){ switchTab(this.dataset.tab); });
});

/* ── Init ── */
loadState();
injectRecurring();
render();
switchTab("dashboard");
</script>
</body>
</html>
